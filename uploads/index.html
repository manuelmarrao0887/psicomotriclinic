  swp:(c="#7B8FA3") => <svg width="22" height="22" fill="none" viewBox="0 0 24 24"><path d="M7 16V4m0 12l-3-3m3 3l3-3M17 8v12m0-12l-3 3m3-3l3 3" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>,

  copy:(c="#0E3A5A") => <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" stroke={c} strokeWidth="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke={c} strokeWidth="2"/></svg>,
  trash:(c="#C62828") => <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><polyline points="3,6 5,6 21,6" stroke={c} strokeWidth="2"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" stroke={c} strokeWidth="2"/></svg>,
  plus:(c="#fff") => <svg width="22" height="22" fill="none" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke={c} strokeWidth="2.5" strokeLinecap="round"/></svg>,

};

/* ═══ UI COMPONENTS ═══ */
const Av = ({t,bg,sz=42}) => ( <div style={{width:sz,height:sz,borderRadius:sz*.33,background:bg||"#D3E0EF",display:"flex",alignItems:"center",justifyContent:"center",fontSize:sz*.31,fontWeight:700,color:"#0E3A5A",flexShrink:0}}>{t}</div> );
const Tag = ({children,type}) => { const m={realizada:["#E8F5E9","#2E7D32"],falta:["#FFF0F0","#C62828"],agendada:["#E8F0FE","#1565C0"],pago:["#E8F5E9","#2E7D32"],pendente:["#FFF8E1","#E65100"],director:["#F3E5F5","#6A1B9A"],professional:["#E8F5E9","#2E7D32"],parent:["#E3F2FD","#1565C0"],pending_director:["#FFF8E1","#E65100"]}; const[bg,c]=m[type]||["#F4F7FA","#0E3A5A"]; return ( <span style={{display:"inline-block",padding:"3px 10px",borderRadius:8,fontSize:11.5,fontWeight:650,background:bg,color:c}}>{children}</span> ); };
const Card = ({children,style,onClick,delay=0}) => ( <div className="ch fu" onClick={onClick} style={{background:"#fff",borderRadius:18,padding:"16px 18px",marginBottom:12,boxShadow:"0 2px 10px rgba(14,58,90,.05)",border:"1px solid #EDF1F5",cursor:onClick?"pointer":"default",animationDelay:`${delay}ms`,...style}}>{children}</div> );
const Stat = ({value,label,bg,accent}) => ( <div style={{flex:1,background:bg||"#F7F9FC",borderRadius:16,padding:"14px 10px",textAlign:"center"}}><div style={{fontSize:22,fontWeight:800,color:accent||"#0E3A5A",lineHeight:1}}>{value}</div><div style={{fontSize:11,color:"#8A9BB0",fontWeight:500,marginTop:5}}>{label}</div></div> );
const Progress = ({pct,color="#0E3A5A",h=6}) => ( <div style={{height:h,borderRadius:h/2,background:"#EDF1F5",overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(pct,100)}%`,borderRadius:h/2,background:color,transition:"width .8s cubic-bezier(.4,0,.2,1)"}}/></div> );
const Section = ({children,right}) => ( <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",margin:"20px 0 10px"}}><span style={{fontSize:15,fontWeight:700,color:"#0E3A5A"}}>{children}</span>{right}</div> );
const Empty = ({text}) => ( <Card style={{textAlign:"center",padding:24,color:"#8A9BB0",fontSize:14}}>{text}</Card> );
const Toast = ({msg,type="success"}) => { if(!msg) return null; const bg=type==="success"?"#0E3A5A":type==="error"?"#C62828":"#E65100"; return ( <div style={{position:"fixed",bottom:100,left:"50%",transform:"translateX(-50%)",background:bg,color:"#fff",padding:"12px 24px",borderRadius:14,fontSize:14,fontWeight:600,zIndex:999,boxShadow:"0 8px 24px rgba(0,0,0,.2)",animation:"ti .3s ease",maxWidth:340,textAlign:"center"}}>{msg}</div> ); };
const TopBar = ({title,onBack}) => ( <div style={{display:"flex",alignItems:"center",padding:"14px 20px",background:"#fff",borderBottom:"1px solid #EDF1F5",position:"sticky",top:0,zIndex:20}}><div onClick={onBack} style={{cursor:"pointer",padding:4,marginRight:10}}>{I.bck()}</div><span style={{fontSize:17,fontWeight:700,color:"#0E3A5A",flex:1}}>{title}</span></div> );
const Nav = ({tabs,active,onChange,badges={}}) => ( <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"#fff",borderTop:"1px solid #EDF1F5",display:"flex",justifyContent:"space-around",padding:"6px 0 26px",zIndex:100}}>{tabs.map(t => ( <div key={t.id} onClick={() => onChange(t.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,fontSize:11,fontWeight:active===t.id?700:500,color:active===t.id?"#0E3A5A":"#8A9BB0",cursor:"pointer",padding:"4px 12px"}}><div style={{position:"relative"}}>{t.icon(active===t.id?"#0E3A5A":"#8A9BB0")}{badges[t.id]>0 && <div style={{position:"absolute",top:-4,right:-8,background:"#E53935",color:"#fff",fontSize:10,fontWeight:700,borderRadius:99,minWidth:17,height:17,display:"flex",alignItems:"center",justifyContent:"center",border:"2px solid #fff"}}>{badges[t.id]}</div>}</div>{t.label}</div> ))}</div> );
const Header = ({title,sub,right}) => ( <div style={{padding:"14px 20px 18px",display:"flex",alignItems:"center",justifyContent:"space-between"}}><div><div style={{fontSize:24,fontWeight:800,color:"#0E3A5A",letterSpacing:-.5,lineHeight:1.15}}>{title}</div>{sub && <div style={{fontSize:13,color:"#8A9BB0",fontWeight:500,marginTop:2}}>{sub}</div>}</div>{right}</div> );
const P = ({children}) => ( <div style={{padding:"0 20px"}}>{children}</div> );
const Sheet = ({open,onClose,title,children}) => { if(!open) return null; return ( <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}><div onClick={e => e.stopPropagation()} style={{background:"#fff",borderRadius:"24px 24px 0 0",padding:"24px 24px 36px",width:"100%",maxWidth:430,maxHeight:"88vh",overflowY:"auto",animation:"su .3s ease"}}><div style={{width:40,height:4,borderRadius:2,background:"#D3E0EF",margin:"0 auto 16px"}}/><div style={{fontSize:17,fontWeight:700,color:"#0E3A5A",marginBottom:18}}>{title}</div>{children}</div></div> ); };
const Field = ({label,children}) => ( <div style={{marginBottom:14}}><div style={{fontSize:13,color:"#8A9BB0",marginBottom:5}}>{label}</div>{children}</div> );
const Inp = (props) => ( <input {...props} style={{width:"100%",padding:"12px 14px",borderRadius:12,border:"1px solid #D3E0EF",fontSize:14,outline:"none",background:"#FAFCFE",...(props.style||{})}} /> );
const Sel = ({value,onChange,options,placeholder}) => ( <select value={value} onChange={e => onChange(e.target.value)} style={{width:"100%",padding:"12px 14px",borderRadius:12,border:"1px solid #D3E0EF",fontSize:14,outline:"none",background:"#FAFCFE"}}><option value="">{placeholder||"Selecionar..."}</option>{options.map(o => ( <option key={o.v} value={o.v}>{o.l}</option> ))}</select> );

const SearchInput = ({value,onChange,placeholder}) => ( <div style={{position:"relative",marginBottom:14}}><div style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)"}}>{I.srch()}</div><input value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} style={{width:"100%",padding:"11px 14px 11px 42px",borderRadius:14,border:"1px solid #E0E7EF",fontSize:14,outline:"none",background:"#FAFCFE"}} /></div> );

/* ═══ LOGIN ═══ */
const Login = () => {
  const [v,setV] = useState(false);
  const [mode,setMode] = useState("login");
  const [email,setEmail] = useState("");
  const [pw,setPw] = useState("");
  const [name,setName] = useState("");
  const [selRole,setSelRole] = useState("");
  const [err,setErr] = useState("");
  const [busy,setBusy] = useState(false);
  useEffect(() => { setTimeout(() => setV(true), 80); }, []);

  const doLogin = async () => {
    if (!email||!pw) return;
    setBusy(true); setErr("");
    const { error } = await sb.auth.signInWithPassword({email, password:pw});
    if (error) { setErr("Email ou password incorretos"); setBusy(false); }
  };

  const doRegister = async () => {
    if (!name||!email||!pw||!selRole) return;
    if (pw.length<6) { setErr("Password: mínimo 6 caracteres"); return; }
    setBusy(true); setErr("");
    const role = selRole==="director" ? "pending_director" : selRole;
    const { data, error } = await sb.auth.signUp({email, password:pw, options:{data:{full_name:name, role}}});
    if (error) { setErr(error.message.includes("already")?"Email já registado":error.message); setBusy(false); return; }
    if (selRole==="director") {
      const s=encodeURIComponent("Psicomotriclinic — Pedido acesso Diretora");
      const b=encodeURIComponent("Olá,\n\n"+name+" ("+email+") pediu acesso como Diretora.\n\nAprove no separador Utilizadores.");
      window.open("mailto:"+ADMIN_EMAIL+"?subject="+s+"&body="+b,"_blank");
      setBusy(false); setMode("pending");
    }
  };

  const doGoogle = async () => {
    await sb.auth.signInWithOAuth({provider:"google",options:{redirectTo:window.location.origin}});
  };

  const iSt = {width:"100%",padding:"14px 18px",borderRadius:14,border:"1px solid rgba(255,255,255,.15)",fontSize:15,outline:"none",background:"rgba(255,255,255,.08)",color:"#fff",marginBottom:10};
  const lnk = {color:"#F0B64D",fontSize:13,fontWeight:600,cursor:"pointer"};

  return (
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"linear-gradient(165deg,#0B2E47 0%,#0E3A5A 35%,#164B6E 100%)",display:"flex",flexDirection:"column",justifyContent:"center",padding:28,transition:"opacity .5s",opacity:v?1:0}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{width:72,height:72,borderRadius:22,background:"rgba(240,182,77,.15)",display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:20,border:"1px solid rgba(240,182,77,.2)"}}><span style={{fontSize:32,fontWeight:800,color:"#F0B64D"}}>P</span></div>
        <h1 style={{color:"#fff",fontSize:26,fontWeight:800,margin:0}}>Psicomotriclinic</h1>
        <p style={{color:"rgba(255,255,255,.45)",fontSize:13,marginTop:6}}>Gestão Clínica</p>
      </div>

      {mode==="login" && (
        <div style={{animation:"fu .4s ease both"}}>
          <input type="email" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} style={iSt}/>
          <input type="password" placeholder="Password" value={pw} onChange={e => setPw(e.target.value)} onKeyDown={e => e.key==="Enter"&&doLogin()} style={iSt}/>
          {err && <p style={{color:"#EF9A9A",fontSize:13,marginBottom:10,textAlign:"center"}}>{err}</p>}
          <button onClick={doLogin} disabled={busy} className="ch" style={{width:"100%",padding:"15px 0",borderRadius:14,background:busy?"rgba(255,255,255,.1)":"#F0B64D",color:"#0E3A5A",border:"none",fontSize:16,fontWeight:700,cursor:"pointer"}}>{busy?"A entrar...":"Entrar"}</button>
          <div style={{display:"flex",alignItems:"center",gap:12,margin:"16px 0"}}><div style={{flex:1,height:1,background:"rgba(255,255,255,.12)"}}/><span style={{color:"rgba(255,255,255,.35)",fontSize:12}}>ou</span><div style={{flex:1,height:1,background:"rgba(255,255,255,.12)"}}/></div>
          <button onClick={doGoogle} className="ch" style={{width:"100%",padding:"14px 0",borderRadius:14,background:"#fff",color:"#243746",border:"none",fontSize:15,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
            <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Entrar com Google
          </button>
          <div style={{textAlign:"center",marginTop:20}}><span style={{color:"rgba(255,255,255,.5)",fontSize:13}}>Sem conta? </span><span onClick={() => {setMode("register");setErr("");}} style={lnk}>Criar conta</span></div>
        </div>
      )}

      {mode==="register" && (
        <div style={{animation:"fu .4s ease both"}}>
          <input placeholder="Nome completo" value={name} onChange={e => setName(e.target.value)} style={iSt}/>
          <input type="email" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} style={iSt}/>
          <input type="password" placeholder="Password (mín. 6)" value={pw} onChange={e => setPw(e.target.value)} style={iSt}/>
          <div style={{fontSize:13,color:"rgba(255,255,255,.5)",marginBottom:8}}>Sou...</div>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            {[{id:"parent",l:"Pai/Mãe",e:"👨‍👩‍👧"},{id:"professional",l:"Profissional",e:"🩺"},{id:"director",l:"Diretora",e:"📊"}].map(r => (
              <div key={r.id} onClick={() => setSelRole(r.id)} className="ch" style={{flex:1,padding:"12px 8px",borderRadius:12,background:selRole===r.id?"rgba(240,182,77,.2)":"rgba(255,255,255,.06)",border:selRole===r.id?"1px solid #F0B64D":"1px solid rgba(255,255,255,.1)",cursor:"pointer",textAlign:"center"}}>
                <div style={{fontSize:22}}>{r.e}</div>
                <div style={{fontSize:11,color:selRole===r.id?"#F0B64D":"rgba(255,255,255,.6)",fontWeight:600,marginTop:4}}>{r.l}</div>
              </div>
            ))}
          </div>
          {selRole==="director" && <div style={{padding:"10px 14px",borderRadius:12,background:"rgba(240,182,77,.12)",marginBottom:12}}><p style={{color:"#F0B64D",fontSize:12,margin:0}}>Requer aprovação do administrador.</p></div>}
          {err && <p style={{color:"#EF9A9A",fontSize:13,marginBottom:10,textAlign:"center"}}>{err}</p>}
          <button onClick={doRegister} disabled={busy||!name||!email||!pw||!selRole} className="ch" style={{width:"100%",padding:"15px 0",borderRadius:14,background:(busy||!selRole)?"rgba(255,255,255,.1)":"#F0B64D",color:"#0E3A5A",border:"none",fontSize:16,fontWeight:700,cursor:"pointer"}}>{busy?"A criar...":"Criar conta"}</button>
          <div style={{textAlign:"center",marginTop:20}}><span style={{color:"rgba(255,255,255,.5)",fontSize:13}}>Já tem conta? </span><span onClick={() => {setMode("login");setErr("");}} style={lnk}>Entrar</span></div>
        </div>
      )}

      {mode==="pending" && (
        <div style={{animation:"fu .4s ease both",textAlign:"center"}}>
          <div style={{width:64,height:64,borderRadius:32,background:"rgba(240,182,77,.15)",display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:16}}>{I.mail("#F0B64D")}</div>
          <h2 style={{color:"#fff",fontSize:20,fontWeight:700,marginBottom:8}}>Pedido enviado</h2>
          <p style={{color:"rgba(255,255,255,.6)",fontSize:14,lineHeight:1.6,marginBottom:24}}>A aguardar aprovação do administrador.</p>
          <button onClick={() => {setMode("login");setBusy(false);setErr("");}} className="ch" style={{padding:"14px 32px",borderRadius:14,background:"rgba(255,255,255,.1)",color:"#fff",border:"1px solid rgba(255,255,255,.15)",fontSize:15,fontWeight:600,cursor:"pointer"}}>Voltar ao login</button>
        </div>
      )}
    </div>
  );
};

/* ═══ ADMIN PORTAL ═══ */
const AdminPortal = ({profile, onLogout}) => {
  const [tab,setTab] = useState("dashboard");
  const [sub,setSub] = useState(null);
  const [toast,setToast] = useState(null);
  const [modal,setModal] = useState(null);
  const [form,setForm] = useState({});
  const [users,setUsers] = useState([]);
  const [profs,setProfs] = useState([]);
  const [pts,setPts] = useState([]);
  const [sess,setSess] = useState([]);
  const [pays,setPays] = useState([]);
  const [reqs,setReqs] = useState([]);
  const [selUser,setSelUser] = useState(null);
  const [selProf,setSelProf] = useState(null);
  const [search,setSearch] = useState("");
  const [inviteResult,setInviteResult] = useState(null);

  const show = (m,t) => { setToast({m,t}); setTimeout(() => setToast(null),3000); };
  const copyText = (t) => { navigator.clipboard?.writeText(t).then(() => show("Copiado!","success")).catch(() => {}); };

  const load = async () => {
    try {
      const [r1,r2,r3,r4,r5,r6] = await Promise.all([
        sb.from('profiles').select('*').order('created_at',{ascending:false}),
        sb.from('professionals').select('*').eq('active',true).order('name'),
        sb.from('patients').select('*').eq('active',true).order('name'),
        sb.from('sessions').select('*').order('date',{ascending:false}).limit(200),
        sb.from('payments').select('*').order('created_at',{ascending:false}),
        sb.from('schedule_requests').select('*').eq('status','pendente'),
      ]);
      setUsers(r1.data||[]); setProfs(r2.data||[]); setPts(r3.data||[]); setSess(r4.data||[]); setPays(r5.data||[]); setReqs(r6.data||[]);
    } catch(e) { console.error(e); }
  };
  useEffect(() => { load(); }, []);

  const realized=sess.filter(s=>s.status==="realizada");
  const rev=(()=>{let t=0;realized.forEach(s=>{const p=pts.find(x=>x.id===s.patient_id);if(p?.session_type==="individual")t+=55;else t+=150;});return t;})();
  const cr=Math.round(rev*.2),pr=Math.round(rev*.8),net=cr-1500,occ=Math.round((realized.length/188)*100);
  const tp=pays.reduce((a,p)=>a+Number(p.amount),0),pp=pays.filter(p=>p.status==="pago").reduce((a,p)=>a+Number(p.amount),0);
  const pend=pays.filter(p=>p.status==="pendente");
  const pendU=users.filter(u=>u.role==="pending_director");

  const changeRole = async (uid,r) => { await sb.from('profiles').update({role:r}).eq('id',uid); show(r==="director"?"Aprovado":"Papel atualizado","success"); await load(); if(selUser?.id===uid) setSelUser(p=>({...p,role:r})); };
  const removeUser = async (uid) => { await sb.from('profiles').delete().eq('id',uid); show("Removido","success"); setSub(null); await load(); };
  const addProf = async () => { if(!form.name)return; const ini=form.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(); await sb.from('professionals').insert({name:form.name,role_title:form.role||'Psicomotricista',avatar_initials:ini,avatar_color:COLORS[profs.length%COLORS.length]}); setModal(null);setForm({});show("Adicionado","success");await load(); };
  const addPatient = async () => { if(!form.name||!form.age||!form.prof||!form.day||!form.hour||!form.area)return; await sb.from('patients').insert({name:form.name,age:parseInt(form.age),professional_id:form.prof,session_type:'individual',day_of_week:form.day,hour:form.hour,periodicity:'Semanal',intervention_area:form.area,start_date:new Date().toISOString().slice(0,7)}); setModal(null);setForm({});show("Paciente criado","success");await load(); };
  const addPayment = async () => { if(!form.pt||!form.amount)return; await sb.from('payments').insert({patient_id:form.pt,month:'Maio 2026',amount:parseFloat(form.amount),status:form.paySt||'pendente',paid_date:form.paySt==='pago'?new Date().toISOString().slice(0,10):null}); setModal(null);setForm({});show("Registado","success");await load(); };
  const inviteUser = async () => {
    if(!form.invName||!form.invEmail||!form.invRole)return;
    const tempPw='Psico'+Math.random().toString(36).slice(2,8)+'!';
    const {data,error}=await sb.auth.signUp({email:form.invEmail,password:tempPw,options:{data:{full_name:form.invName,role:form.invRole}}});
    if(error){show("Erro: "+error.message,"error");return;}
    if(data?.user){
      await sb.from('profiles').upsert({id:data.user.id,email:form.invEmail,full_name:form.invName,role:form.invRole});
      if(form.invRole==='professional'){const ini=form.invName.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();await sb.from('professionals').insert({name:form.invName,role_title:'Psicomotricista',avatar_initials:ini,avatar_color:COLORS[profs.length%COLORS.length],profile_id:data.user.id});}
    }
    setInviteResult({email:form.invEmail,pw:tempPw,role:form.invRole,name:form.invName});show("Conta criada","success");await load();
  };

  const nt=[{id:"dashboard",label:"Dashboard",icon:I.bar},{id:"users",label:"Utilizadores",icon:I.shield},{id:"manage",label:"Gestão",icon:I.gear},{id:"requests",label:"Pedidos",icon:I.swp}];

  return (
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"#F4F7FA",position:"relative"}}>
      <div style={{paddingBottom:88}}>
        <Header title="Administração" sub={profile?.full_name} right={<div onClick={onLogout} style={{cursor:"pointer"}}><Av t={profile?.full_name?.split(" ").map(w=>w[0]).join("").slice(0,2)||"A"} bg="#F0B64D" sz={38}/></div>}/>

        {/* DASHBOARD */}
        {tab==="dashboard"&&!sub&&<P>
          <Card delay={0} style={{background:"linear-gradient(135deg,#0E3A5A,#1A5F8A)",border:"none",color:"#fff"}}><div style={{fontSize:12,opacity:.6}}>Receita bruta</div><div style={{fontSize:34,fontWeight:800,letterSpacing:-1,marginBottom:4}}>{rev.toLocaleString("pt-PT")}€</div><div style={{display:"flex",gap:20,marginTop:8}}><div><div style={{fontSize:11,opacity:.5}}>Clínica (20%)</div><div style={{fontSize:17,fontWeight:700}}>{cr}€</div></div><div><div style={{fontSize:11,opacity:.5}}>Prof. (80%)</div><div style={{fontSize:17,fontWeight:700}}>{pr}€</div></div><div><div style={{fontSize:11,opacity:.5}}>Resultado</div><div style={{fontSize:17,fontWeight:800,color:net>=0?"#A5D6A7":"#EF9A9A"}}>{net>=0?"+":""}{net}€</div></div></div></Card>
          <div style={{display:"flex",gap:8,marginBottom:4}}><Stat value={realized.length} label="Realizadas" bg="#F0FAF0" accent="#2E7D32"/><Stat value={sess.filter(s=>s.status==="falta").length} label="Faltas" bg="#FFF5F5" accent="#C62828"/><Stat value={sess.filter(s=>s.status==="agendada").length} label="Agendadas" bg="#F0F4FF" accent="#1565C0"/></div>
          <Card delay={60}><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:14,fontWeight:600,color:"#0E3A5A"}}>Ocupação</span><span style={{fontSize:14,fontWeight:800}}>{occ}%</span></div><Progress pct={occ} color="#AFC9A3"/><div style={{fontSize:12,color:"#8A9BB0",marginTop:6}}>{realized.length} de 188</div></Card>
          <Card delay={80}><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:14,fontWeight:600,color:"#0E3A5A"}}>Cobrança</span><span style={{fontSize:14,fontWeight:800,color:tp>0&&pp/tp>=.8?"#2E7D32":"#E65100"}}>{tp>0?Math.round(pp/tp*100):0}%</span></div><Progress pct={tp>0?pp/tp*100:0} color={tp>0&&pp/tp>=.8?"#AFC9A3":"#F0B64D"}/></Card>
          {pend.length>0&&<Card delay={100} style={{borderLeft:"4px solid #F0B64D",background:"#FFFDF7"}}><div style={{fontSize:13,fontWeight:700,color:"#E65100",marginBottom:6}}>Pendentes ({pend.length})</div>{pend.map(p=>{const pt=pts.find(x=>x.id===p.patient_id);return (<div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #F5F0E5"}}><span style={{fontSize:13,color:"#4A5568"}}>{pt?.name||"—"}</span><span style={{fontSize:13,fontWeight:700,color:"#E65100"}}>{p.amount}€</span></div>);})}</Card>}
          <Section>Profissionais</Section>
          {profs.map((p,i)=>{const pP=pts.filter(pt=>pt.professional_id===p.id);return (<Card key={p.id} delay={i*50+120} onClick={()=>{setSelProf(p);setSub("prof");}}><div style={{display:"flex",alignItems:"center",gap:12}}><Av t={p.avatar_initials} bg={p.avatar_color}/><div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:"#0E3A5A"}}>{p.name}</div><div style={{fontSize:12,color:"#8A9BB0"}}>{pP.length} casos</div></div>{I.arr()}</div></Card>);})}
          <Section>Custos</Section>
          <Card delay={300}><div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><span style={{fontSize:14,color:"#4A5568"}}>Renda</span><span style={{fontSize:14,fontWeight:700,color:"#C62828"}}>-1.500€</span></div><div style={{height:1,background:"#EDF1F5",margin:"6px 0"}}/><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:15,fontWeight:700,color:"#0E3A5A"}}>Resultado</span><span style={{fontSize:18,fontWeight:800,color:net>=0?"#2E7D32":"#C62828"}}>{net>=0?"+":""}{net}€</span></div></Card>
        </P>}

        {/* USERS */}
        {tab==="users"&&!sub&&<P>
          {pendU.length>0&&<><Section>Aguardam aprovação ({pendU.length})</Section>{pendU.map((u,i)=>(<Card key={u.id} delay={i*60} style={{borderLeft:"4px solid #F0B64D"}}><div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}><Av t={u.full_name?.split(" ").map(w=>w[0]).join("").slice(0,2)} bg="#FFF8E1" sz={40}/><div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,color:"#0E3A5A"}}>{u.full_name}</div><div style={{fontSize:12,color:"#8A9BB0"}}>{u.email}</div></div><Tag type="pending_director">Pendente</Tag></div><div style={{display:"flex",gap:8}}><button onClick={()=>changeRole(u.id,"director")} className="ch" style={{flex:1,padding:"11px 0",borderRadius:12,border:"none",background:"#0E3A5A",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>{I.chk()} Aprovar</button><button onClick={()=>changeRole(u.id,"parent")} className="ch" style={{flex:1,padding:"11px 0",borderRadius:12,border:"1px solid #D3E0EF",background:"#fff",color:"#0E3A5A",fontSize:13,fontWeight:600,cursor:"pointer"}}>Recusar</button></div></Card>))}</>}
          <Section right={<span onClick={()=>{setForm({});setInviteResult(null);setModal("invite");}} style={{cursor:"pointer",color:"#0E3A5A",fontWeight:700,fontSize:13}}>+ Convidar</span>}>Todos ({users.length})</Section>
          <SearchInput value={search} onChange={setSearch} placeholder="Procurar..."/>
          {users.filter(u=>!search||u.full_name?.toLowerCase().includes(search.toLowerCase())||u.email?.toLowerCase().includes(search.toLowerCase())).map((u,i)=>(<Card key={u.id} delay={i*40} onClick={()=>{setSelUser(u);setSub("user-detail");}}><div style={{display:"flex",alignItems:"center",gap:12}}><Av t={u.full_name?.split(" ").map(w=>w[0]).join("").slice(0,2)||"?"} bg={u.role==="director"?"#F3E5F5":u.role==="professional"?"#E8F5E9":"#E3F2FD"} sz={40}/><div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:"#0E3A5A"}}>{u.full_name||u.email}</div><div style={{fontSize:12,color:"#8A9BB0"}}>{u.email}</div></div><Tag type={u.role}>{RL[u.role]||u.role}</Tag></div></Card>))}
        </P>}

        {/* USER DETAIL */}
        {sub==="user-detail"&&selUser&&<div><TopBar title={selUser.full_name||"Utilizador"} onBack={()=>setSub(null)}/><P>
          <Card style={{marginTop:14,textAlign:"center"}}><Av t={selUser.full_name?.split(" ").map(w=>w[0]).join("").slice(0,2)} bg={selUser.role==="director"?"#F3E5F5":"#D3E0EF"} sz={64}/><div style={{fontSize:20,fontWeight:700,color:"#0E3A5A",marginTop:12}}>{selUser.full_name}</div><div style={{fontSize:13,color:"#8A9BB0",marginTop:4}}>{selUser.email}</div><div style={{marginTop:10}}><Tag type={selUser.role}>{RL[selUser.role]}</Tag></div></Card>
          <Section>Alterar papel</Section>
          <div style={{display:"flex",gap:8,marginBottom:16}}>{["parent","professional","director"].map(r=>(<button key={r} onClick={()=>changeRole(selUser.id,r)} className="ch" style={{flex:1,padding:"12px 8px",borderRadius:12,border:selUser.role===r?"2px solid #0E3A5A":"1px solid #D3E0EF",background:selUser.role===r?"#EDF6FF":"#fff",fontSize:13,fontWeight:600,color:"#0E3A5A",cursor:"pointer",opacity:selUser.role===r?.6:1}}>{RL[r]}</button>))}</div>
          {selUser.email!==profile?.email&&<Btn secondary onClick={()=>{if(confirm("Remover este utilizador?")){removeUser(selUser.id);}}}>{I.trash()} Remover</Btn>}
        </P></div>}

        {/* PROF DETAIL */}
        {sub==="prof"&&selProf&&(()=>{const p=selProf,pP=pts.filter(pt=>pt.professional_id===p.id),pS=sess.filter(s=>pP.some(pt=>pt.id===s.patient_id)&&s.status==="realizada");let iE=0,gE=0;pS.forEach(s=>{const pt=pts.find(x=>x.id===s.patient_id);if(pt?.session_type==="individual")iE+=55*.8;else gE+=150*.4;}); return (<div><TopBar title={p.name} onBack={()=>setSub(null)}/><P><Card style={{marginTop:14,textAlign:"center"}}><Av t={p.avatar_initials} bg={p.avatar_color} sz={56}/><div style={{fontSize:18,fontWeight:700,color:"#0E3A5A",marginTop:10}}>{p.name}</div><div style={{fontSize:13,color:"#8A9BB0"}}>{p.role_title}</div></Card><div style={{display:"flex",gap:8,marginBottom:4}}><Stat value={pP.length} label="Casos" bg="#F0F4FF" accent="#1565C0"/><Stat value={pS.length} label="Realizadas" bg="#F0FAF0" accent="#2E7D32"/><Stat value={`${(iE+gE).toFixed(0)}€`} label="Ganhos" bg="#FFFAF0" accent="#E65100"/></div><Section>Casos</Section>{pP.map((pt,i)=>(<Card key={pt.id} delay={i*40}><div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:4,height:32,borderRadius:2,background:"#AFC9A3"}}/><div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:"#0E3A5A"}}>{pt.name}</div><div style={{fontSize:12,color:"#8A9BB0"}}>{pt.day_of_week} {pt.hour} · {pt.intervention_area}</div></div></div></Card>))}</P></div>);})()}

        {/* MANAGE */}
        {tab==="manage"&&!sub&&<P>
          <Section>Ações</Section>
          {[{m:"invite",t:"Convidar utilizador",d:"Criar conta e enviar credenciais",bg:"#F3E5F5",ic:I.mail("#6A1B9A")},{m:"addProf",t:"Adicionar profissional",d:"Novo terapeuta",bg:"#E8F5E9",ic:I.usr("#2E7D32")},{m:"addPatient",t:"Adicionar paciente",d:"Novo caso clínico",bg:"#E3F2FD",ic:I.usr("#1565C0")},{m:"addPayment",t:"Registar pagamento",d:"Recibo ou pendente",bg:"#FFF8E1",ic:I.bar("#E65100")}].map((a,i)=>(<Card key={a.m} delay={i*60} onClick={()=>{setForm({});setInviteResult(null);setModal(a.m);}}><div style={{display:"flex",alignItems:"center",gap:14}}><div style={{width:48,height:48,borderRadius:14,background:a.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>{a.ic}</div><div style={{flex:1}}><div style={{fontSize:15,fontWeight:700,color:"#0E3A5A"}}>{a.t}</div><div style={{fontSize:13,color:"#8A9BB0"}}>{a.d}</div></div>{I.arr()}</div></Card>))}
          <Section>Equipa ({profs.length})</Section>
          {profs.map((p,i)=>(<Card key={p.id} delay={i*40+240}><div style={{display:"flex",alignItems:"center",gap:12}}><Av t={p.avatar_initials} bg={p.avatar_color} sz={38}/><div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:"#0E3A5A"}}>{p.name}</div><div style={{fontSize:12,color:"#8A9BB0"}}>{p.role_title}</div></div><Tag type="professional">Ativo</Tag></div></Card>))}
        </P>}

        {/* REQUESTS */}
        {tab==="requests"&&<P>
          <Section>Pedidos ({reqs.length})</Section>
          {reqs.length===0&&<Empty text="Sem pedidos pendentes"/>}
          {reqs.map((r,i)=>{const prN=profs.find(p=>p.id===r.professional_id)?.name,ptN=pts.find(p=>p.id===r.patient_id)?.name;return (<Card key={r.id} delay={i*80}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><span style={{fontWeight:700,fontSize:14,color:"#0E3A5A"}}>{prN||"—"}</span><Tag type="pendente">Pendente</Tag></div><div style={{background:"#F7F9FC",borderRadius:12,padding:"10px 14px",marginBottom:10}}><div style={{fontSize:13,color:"#4A5568",marginBottom:4}}>Paciente: <strong>{ptN||"—"}</strong></div><div style={{fontSize:13,display:"flex",alignItems:"center",gap:6}}><span style={{padding:"2px 8px",borderRadius:6,background:"#FFF0F0",color:"#C62828",fontSize:12}}>{r.from_schedule}</span><span style={{color:"#8A9BB0"}}>→</span><span style={{padding:"2px 8px",borderRadius:6,background:"#E8F5E9",color:"#2E7D32",fontSize:12}}>{r.to_schedule}</span></div>{r.reason&&<div style={{fontSize:12,color:"#8A9BB0",marginTop:6}}>{r.reason}</div>}</div><div style={{display:"flex",gap:8}}><button onClick={async()=>{await sb.from('schedule_requests').update({status:'aprovado'}).eq('id',r.id);show("Aprovado","success");await load();}} className="ch" style={{flex:1,padding:"11px 0",borderRadius:12,border:"none",background:"#0E3A5A",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>{I.chk()} Aprovar</button><button onClick={async()=>{await sb.from('schedule_requests').update({status:'recusado'}).eq('id',r.id);show("Recusado","error");await load();}} className="ch" style={{flex:1,padding:"11px 0",borderRadius:12,border:"1px solid #D3E0EF",background:"#fff",color:"#0E3A5A",fontSize:13,fontWeight:600,cursor:"pointer"}}>Recusar</button></div></Card>);})}
        </P>}
      </div>

      {!sub&&<Nav tabs={nt} active={tab} onChange={t=>{setTab(t);setSub(null);setSearch("");}} badges={{requests:reqs.length,users:pendU.length}}/>}
      <Toast msg={toast?.m} type={toast?.t}/>

      {/* MODALS */}
      <Sheet open={modal==="invite"} onClose={()=>{setModal(null);setInviteResult(null);}} title="Convidar utilizador">
        {!inviteResult?(<><Field label="Nome"><Inp placeholder="Ex: João Silva" value={form.invName||""} onChange={e=>setForm(f=>({...f,invName:e.target.value}))}/></Field><Field label="Email"><Inp type="email" placeholder="joao@email.pt" value={form.invEmail||""} onChange={e=>setForm(f=>({...f,invEmail:e.target.value}))}/></Field><Field label="Papel"><Sel value={form.invRole||""} onChange={v=>setForm(f=>({...f,invRole:v}))} options={[{v:"professional",l:"Profissional"},{v:"parent",l:"Pai / Mãe"},{v:"director",l:"Diretora"}]}/></Field><div style={{marginTop:8}}><Btn onClick={inviteUser} disabled={!form.invName||!form.invEmail||!form.invRole}>Criar conta</Btn></div></>):(<div><div style={{textAlign:"center",marginBottom:20}}><div style={{width:56,height:56,borderRadius:28,background:"#E8F5E9",display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:12}}>{I.chk("#2E7D32")}</div><div style={{fontSize:16,fontWeight:700,color:"#0E3A5A"}}>Conta criada!</div></div><div style={{background:"#F7F9FC",borderRadius:14,padding:16,marginBottom:16}}><div style={{marginBottom:12}}><div style={{fontSize:12,color:"#8A9BB0"}}>Email</div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:15,fontWeight:600,color:"#0E3A5A"}}>{inviteResult.email}</span><div onClick={()=>copyText(inviteResult.email)} style={{cursor:"pointer",padding:4}}>{I.copy()}</div></div></div><div style={{marginBottom:12}}><div style={{fontSize:12,color:"#8A9BB0"}}>Password</div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:15,fontWeight:600,color:"#0E3A5A",fontFamily:"monospace"}}>{inviteResult.pw}</span><div onClick={()=>copyText(inviteResult.pw)} style={{cursor:"pointer",padding:4}}>{I.copy()}</div></div></div><div><div style={{fontSize:12,color:"#8A9BB0"}}>Papel</div><Tag type={inviteResult.role}>{RL[inviteResult.role]}</Tag></div></div><Btn onClick={()=>copyText("Olá "+inviteResult.name+"!\n\nAcesso à Psicomotriclinic:\n\nLink: "+window.location.href+"\nEmail: "+inviteResult.email+"\nPassword: "+inviteResult.pw+"\n\nAltera a password depois de entrar.")}>Copiar mensagem</Btn><div style={{marginTop:8}}><Btn secondary onClick={()=>{setModal(null);setInviteResult(null);}}>Fechar</Btn></div></div>)}
      </Sheet>
      <Sheet open={modal==="addProf"} onClose={()=>setModal(null)} title="Adicionar profissional"><Field label="Nome"><Inp placeholder="Ex: Maria Santos" value={form.name||""} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></Field><Field label="Função"><Sel value={form.role||"Psicomotricista"} onChange={v=>setForm(f=>({...f,role:v}))} options={[{v:"Psicomotricista",l:"Psicomotricista"},{v:"Terapeuta Ocupacional",l:"Terapeuta Ocupacional"},{v:"Psicólogo/a",l:"Psicólogo/a"}]}/></Field><div style={{marginTop:8}}><Btn onClick={addProf} disabled={!form.name}>Adicionar</Btn></div></Sheet>
      <Sheet open={modal==="addPatient"} onClose={()=>setModal(null)} title="Novo paciente"><Field label="Nome"><Inp placeholder="Ex: Maria S." value={form.name||""} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></Field><Field label="Idade"><Inp type="number" placeholder="12" value={form.age||""} onChange={e=>setForm(f=>({...f,age:e.target.value}))}/></Field><Field label="Profissional"><Sel value={form.prof||""} onChange={v=>setForm(f=>({...f,prof:v}))} options={profs.map(p=>({v:p.id,l:p.name}))}/></Field><Field label="Área"><Sel value={form.area||""} onChange={v=>setForm(f=>({...f,area:v}))} options={AREAS.map(a=>({v:a,l:a}))}/></Field><Field label="Dia"><Sel value={form.day||""} onChange={v=>setForm(f=>({...f,day:v}))} options={DAYS.map(d=>({v:d,l:d}))}/></Field><Field label="Hora"><Sel value={form.hour||""} onChange={v=>setForm(f=>({...f,hour:v}))} options={HOURS.map(h=>({v:h,l:h}))}/></Field><div style={{marginTop:8}}><Btn onClick={addPatient} disabled={!form.name||!form.age||!form.prof||!form.area||!form.day||!form.hour}>Criar</Btn></div></Sheet>
      <Sheet open={modal==="addPayment"} onClose={()=>setModal(null)} title="Registar pagamento"><Field label="Paciente"><Sel value={form.pt||""} onChange={v=>setForm(f=>({...f,pt:v}))} options={pts.map(p=>({v:p.id,l:p.name}))}/></Field><Field label="Valor (€)"><Inp type="number" placeholder="220" value={form.amount||""} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/></Field><Field label="Estado"><Sel value={form.paySt||"pendente"} onChange={v=>setForm(f=>({...f,paySt:v}))} options={[{v:"pago",l:"Pago"},{v:"pendente",l:"Pendente"}]}/></Field><div style={{marginTop:8}}><Btn onClick={addPayment} disabled={!form.pt||!form.amount}>Registar</Btn></div></Sheet>
    </div>
  );
};

/* ═══ SIMPLE PORTAL ═══ */
const SimplePortal = ({role,profile,onLogout}) => (
  <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"#F4F7FA"}}>
    <Header title="Olá 👋" sub={profile?.full_name} right={<div onClick={onLogout} style={{cursor:"pointer"}}><Av t={profile?.full_name?.split(" ").map(w=>w[0]).join("").slice(0,2)||"?"} bg="#D3E0EF" sz={38}/></div>}/>
    <P><Card style={{textAlign:"center",padding:40,marginTop:20}}><div style={{fontSize:48,marginBottom:16}}>{role==="parent"?"👨‍👩‍👧":"🩺"}</div><div style={{fontSize:20,fontWeight:700,color:"#0E3A5A",marginBottom:8}}>{RL[role]}</div><div style={{fontSize:14,color:"#8A9BB0"}}>Sessão iniciada como <Tag type={role}>{RL[role]}</Tag></div><div style={{fontSize:13,color:"#8A9BB0",marginTop:16}}>Portal em desenvolvimento.</div></Card><div style={{marginTop:16}}><Btn secondary onClick={onLogout}>Terminar sessão</Btn></div></P>
  </div>
);

/* ═══ APP ═══ */
function App() {
  const [profile,setProfile] = useState(null);
  const [loading,setLoading] = useState(true);

  const getProfile = async (user) => {
    if (!user) return null;
    try {
      const {data} = await sb.from('profiles').select('*').eq('id',user.id).maybeSingle();
      if (data) return data;
      const meta = user.user_metadata||{};
      const np = {id:user.id, email:user.email, full_name:meta.full_name||user.email?.split('@')[0]||'Utilizador', role:meta.role||'parent'};
      const {data:c} = await sb.from('profiles').upsert(np).select().maybeSingle();
      return c||np;
    } catch(e) {
      console.error(e);
      const meta = user.user_metadata||{};
      return {id:user.id, email:user.email, full_name:meta.full_name||'Utilizador', role:meta.role||'parent'};
    }
  };

  useEffect(() => {
    sb.auth.getSession().then(async ({data:{session}}) => {
      try { if (session?.user) setProfile(await getProfile(session.user)); } catch(e) { console.error(e); }
      setLoading(false);
    }).catch(() => setLoading(false));

    const {data:{subscription}} = sb.auth.onAuthStateChange(async (ev,session) => {
      try {
        if (ev==='SIGNED_IN'&&session?.user) { setProfile(await getProfile(session.user)); setLoading(false); }
        else if (ev==='SIGNED_OUT') setProfile(null);
      } catch(e) { console.error(e); setLoading(false); }
    });
    return () => subscription.unsubscribe();
  }, []);

  const logout = async () => { await sb.auth.signOut(); setProfile(null); };

  if (loading) return ( <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"#0E3A5A",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{textAlign:"center",color:"#fff"}}><div style={{width:48,height:48,borderRadius:16,background:"rgba(240,182,77,.15)",display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:16}}><span style={{fontSize:24,fontWeight:800,color:"#F0B64D"}}>P</span></div><p style={{fontSize:14,opacity:.6}}>A carregar...</p></div></div> );

  if (!profile) return ( <Login /> );

  if (profile.role==="pending_director") return ( <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"#F4F7FA",display:"flex",alignItems:"center",justifyContent:"center",padding:28}}><div style={{textAlign:"center"}}><div style={{width:64,height:64,borderRadius:32,background:"#FFF8E1",display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:16}}>{I.mail("#E65100")}</div><h2 style={{fontSize:20,fontWeight:700,color:"#0E3A5A",marginBottom:8}}>Aprovação pendente</h2><p style={{fontSize:14,color:"#6B7C93",lineHeight:1.6,marginBottom:24}}>A aguardar aprovação.</p><button onClick={logout} className="ch" style={{padding:"14px 32px",borderRadius:14,background:"#EDF1F5",color:"#0E3A5A",border:"none",fontSize:15,fontWeight:600,cursor:"pointer"}}>Terminar sessão</button></div></div> );

  if (profile.role==="director"||profile.email===ADMIN_EMAIL) return ( <AdminPortal profile={profile} onLogout={logout}/> );

  return ( <SimplePortal role={profile.role} profile={profile} onLogout={logout}/> );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
