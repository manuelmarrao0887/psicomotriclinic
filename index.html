const Field = ({label,children}) => ( <div style={{marginBottom:14}}><div style={{fontSize:13,color:"#8A9BB0",marginBottom:5}}>{label}</div>{children}</div> );

/* ═══ LOGIN ═══ */
const Login = ({onLogin}) => {
  const [v,setV] = useState(false);
  const [email,setEmail] = useState("");
  const [pw,setPw] = useState("");
  const [err,setErr] = useState("");
  const [busy,setBusy] = useState(false);
  useEffect(()=>{ setTimeout(()=>setV(true),80); },[]);

  const handleEmail = async () => {
    if(!email||!pw) return;
    setBusy(true); setErr("");
    const { error } = await sb.auth.signInWithPassword({email, password:pw});
    if(error){ setErr("Email ou password incorretos"); setBusy(false); }
  };

  const roles=[{id:"parent",label:"Pai / Mãe",emoji:"👨‍👩‍👧",desc:"Sessões, notas e pagamentos"},{id:"professional",label:"Profissional",emoji:"🩺",desc:"Check-in, agenda e casos"},{id:"director",label:"Diretora Clínica",emoji:"📊",desc:"Dashboard completo"}];
  const iSt = {width:"100%",padding:"14px 18px",borderRadius:14,border:"1px solid rgba(255,255,255,.15)",fontSize:15,outline:"none",background:"rgba(255,255,255,.08)",color:"#fff",marginBottom:10};

  return (
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"linear-gradient(165deg,#0B2E47 0%,#0E3A5A 35%,#164B6E 100%)",display:"flex",flexDirection:"column",justifyContent:"center",padding:28,transition:"opacity .5s",opacity:v?1:0}}>
      <div style={{textAlign:"center",marginBottom:40}}>
        <div style={{width:72,height:72,borderRadius:22,background:"rgba(240,182,77,.15)",display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:20,border:"1px solid rgba(240,182,77,.2)"}}><span style={{fontSize:32,fontWeight:800,color:"#F0B64D"}}>P</span></div>
        <h1 style={{color:"#fff",fontSize:26,fontWeight:800,margin:0,letterSpacing:-.5}}>Psicomotriclinic</h1>
        <p style={{color:"rgba(255,255,255,.45)",fontSize:13,marginTop:6}}>Gestão Clínica Integrada</p>
      </div>

      {isDemo ? (
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {roles.map((r,i)=> (
            <button key={r.id} onClick={()=>onLogin(r.id)} className="ch" style={{display:"flex",alignItems:"center",gap:14,width:"100%",padding:"16px 20px",background:"rgba(255,255,255,.07)",color:"#fff",border:"1px solid rgba(255,255,255,.1)",borderRadius:16,cursor:"pointer",fontSize:15,fontWeight:600,textAlign:"left",animation:"fu .45s ease both",animationDelay:`${i*100+200}ms`}}>
              <span style={{fontSize:28,width:44,textAlign:"center"}}>{r.emoji}</span>
              <div style={{flex:1}}><div>{r.label}</div><div style={{fontSize:12,fontWeight:400,opacity:.5,marginTop:1}}>{r.desc}</div></div>
              {I.arr("rgba(255,255,255,.3)")}
            </button>
          ))}
          <div style={{textAlign:"center",marginTop:16,padding:"10px 16px",borderRadius:12,background:"rgba(240,182,77,.12)"}}>
            <p style={{color:"#F0B64D",fontSize:12,fontWeight:600,margin:0}}>Modo demo — dados locais</p>
          </div>
        </div>
      ) : (
        <div style={{animation:"fu .45s ease both",animationDelay:"200ms"}}>
          <input type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} style={iSt} />
          <input type="password" placeholder="Password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleEmail()} style={iSt} />
          {err && <p style={{color:"#EF9A9A",fontSize:13,marginBottom:10,textAlign:"center"}}>{err}</p>}
          <button onClick={handleEmail} disabled={busy} className="ch" style={{width:"100%",padding:"15px 0",borderRadius:14,background:busy?"rgba(255,255,255,.1)":"#F0B64D",color:"#0E3A5A",border:"none",fontSize:16,fontWeight:700,cursor:busy?"wait":"pointer",marginTop:4}}>{busy?"A entrar...":"Entrar"}</button>
        </div>
      )}
      <p style={{color:"rgba(255,255,255,.2)",fontSize:11,textAlign:"center",marginTop:40}}>v1.3{isDemo?" · Demo":""}</p>
    </div>
  );
};

/* ═══ PROFESSIONAL PORTAL ═══ */
const ProfPortal = ({D:d,setD,onLogout}) => {

      {!sub&&<Nav tabs={nt} active={tab} onChange={t=>{setTab(t);setSub(null);setSearch("");}} badges={{requests:d.reqs.length}}/>}
      <Toast msg={toast?.m} type={toast?.t}/>
      <Sheet open={modal==="addProf"} onClose={()=>setModal(null)} title="Adicionar profissional"><Field label="Nome completo"><Inp placeholder="Ex: Maria Santos" value={form.name||""} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></Field><Field label="Função"><Sel value={form.role||"Psicomotricista"} onChange={v=>setForm(f=>({...f,role:v}))} options={[{v:"Psicomotricista",l:"Psicomotricista"},{v:"Terapeuta Ocupacional",l:"Terapeuta Ocupacional"},{v:"Psicólogo/a",l:"Psicólogo/a"}]}/></Field><div style={{marginTop:8}}><Btn onClick={addProf} disabled={!form.name}>Adicionar</Btn></div></Sheet>
      <Sheet open={modal==="addPatient"} onClose={()=>setModal(null)} title="Novo caso"><Field label="Nome"><Inp placeholder="Ex: Maria S." value={form.name||""} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></Field><Field label="Idade"><Inp type="number" placeholder="12" value={form.age||""} onChange={e=>setForm(f=>({...f,age:e.target.value}))}/></Field><Field label="Profissional"><Sel value={form.prof||""} onChange={v=>setForm(f=>({...f,prof:v}))} options={d.profs.map(p=>({v:p.id,l:p.name}))}/></Field><Field label="Área"><Sel value={form.area||""} onChange={v=>setForm(f=>({...f,area:v}))} options={AREAS.map(a=>({v:a,l:a}))}/></Field><Field label="Dia"><Sel value={form.day||""} onChange={v=>setForm(f=>({...f,day:v}))} options={DAYS.map(d=>({v:d,l:d}))}/></Field><Field label="Hora"><Sel value={form.hour||""} onChange={v=>setForm(f=>({...f,hour:v}))} options={HOURS.map(h=>({v:h,l:h}))}/></Field><div style={{marginTop:8}}><Btn onClick={addPatient} disabled={!form.name||!form.age||!form.prof||!form.area||!form.day||!form.hour}>Criar caso</Btn></div></Sheet>
      <Sheet open={modal==="addPayment"} onClose={()=>setModal(null)} title="Registar pagamento"><Field label="Paciente"><Sel value={form.pt||""} onChange={v=>setForm(f=>({...f,pt:v}))} options={d.pts.map(p=>({v:p.id,l:p.name}))}/></Field><Field label="Valor (€)"><Inp type="number" placeholder="220" value={form.amount||""} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/></Field><Field label="Estado"><Sel value={form.paySt||"pendente"} onChange={v=>setForm(f=>({...f,paySt:v}))} options={[{v:"pago",l:"Pago"},{v:"pendente",l:"Pendente"}]}/></Field><div style={{marginTop:8}}><Btn onClick={addPayment} disabled={!form.pt||!form.amount}>Registar</Btn></div></Sheet>
    </div>
  );
};

/* ═══ APP ROOT ═══ */
function App() {
  const [role,setRole] = useState(null);
  const [vis,setVis] = useState(true);
  const [data,setData] = useState(INIT);
  const [sbUser,setSbUser] = useState(null);

  // Supabase auth listener
  useEffect(()=>{
    if(isDemo || !sb) return;
    sb.auth.getSession().then(({data:{session}})=>{
      if(session?.user) loadProfile(session.user.id);
    });
    const {data:{subscription}} = sb.auth.onAuthStateChange(async(_,session)=>{
      if(session?.user) await loadProfile(session.user.id);
      else { setSbUser(null); setRole(null); }
    });
    return ()=>subscription.unsubscribe();
  },[]);

  async function loadProfile(uid) {
    const {data:p} = await sb.from('profiles').select('*').eq('id',uid).single();
    if(p){ setSbUser(p); setRole(p.role); }
  }

  const go = (r) => { setVis(false); setTimeout(()=>{ setRole(r); setTimeout(()=>setVis(true),30); },200); };
  const logout = () => {
    setVis(false);
    if(!isDemo && sb) sb.auth.signOut();
    setTimeout(()=>{ setRole(null); setSbUser(null); setTimeout(()=>setVis(true),30); },200);
  };

  const s = {transition:"opacity .25s ease",opacity:vis?1:0};

  if(!role) return ( <div style={s}><Login onLogin={go}/></div> );
  if(role==="parent") return ( <div style={s}><ParentPortal D={data} setD={setData} onLogout={logout}/></div> );
  if(role==="professional") return ( <div style={s}><ProfPortal D={data} setD={setData} onLogout={logout}/></div> );
  if(role==="director") return ( <div style={s}><DirPortal D={data} setD={setData} onLogout={logout}/></div> );
  return ( <div style={s}><Login onLogin={go}/></div> );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
