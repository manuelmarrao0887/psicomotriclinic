<html lang="pt-PT">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>

<title>Psicomotriclinic — Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='8' r='3' fill='%23E8A13C'/><circle cx='16' cy='14' r='4.5' fill='%238DBF94'/><ellipse cx='13' cy='22' rx='6.5' ry='4.5' fill='%23152741'/><ellipse cx='19' cy='23' rx='6' ry='4' fill='%23B9CDE0'/></svg>"/>
<style>
:root{
  --navy:#152741;
  --navy-2:#1E3556;
  --navy-soft:#2A4569;
  --cream:#F7F4EE;
  --cream-2:#EFEBE2;
  --paper:#FBF9F4;
  --sage:#8DBF94;
  --sage-soft:#C7DDCB;
  --sky:#B9CDE0;
  --sky-soft:#DCE7F0;
  --amber:#E8A13C;
  --amber-soft:#F5D9A8;
  --ink:#3C3C3B;
  --ink-2:#5A5A58;
  --muted:#8A8A86;
  --line:#E5E0D4;
  --line-2:#D9D3C5;
  --danger:#B83A3A;
  --danger-soft:#F4E0E0;
  --success:#3D7A4A;
  --success-soft:#DDEADE;
  --warn:#C97A1F;
  --warn-soft:#F5E5CD;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--cream);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  font-size:15px;
  line-height:1.55;
}
input,textarea,button,select{font-family:inherit;color:inherit}
button{background:none;border:none;cursor:pointer}
.serif{font-family:'Fraunces',Georgia,serif;font-weight:300;letter-spacing:-0.02em}
.serif-it{font-family:'Fraunces',Georgia,serif;font-weight:400;font-style:italic;letter-spacing:-0.005em}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:10px;border:2px solid var(--cream)}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes ti{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes shimmer{0%{background-position:-200px 0}100%{background-position:200px 0}}
.fu{animation:fu .35s ease both}
.ch{transition:transform .12s ease, background .15s ease, border-color .15s ease, box-shadow .15s ease}
.ch:hover{}
.ch:active{transform:scale(.985)}
input:focus, select:focus, textarea:focus{outline:none;border-color:var(--navy)!important;box-shadow:0 0 0 3px rgba(21,39,65,.08)}
button:disabled{cursor:not-allowed;opacity:.55}

/* ═════ DARK MODE ═════ */
/* Approach: filter-style replacements on inline styles + :root overrides */
html.dark{
  --navy:#E8E3D7;       /* swap navy text → cream-ish */
  --navy-2:#F0EBE0;
  --navy-soft:#C9C2B0;
  --cream:#0E1A2C;      /* page bg → deep navy */
  --cream-2:#152741;    /* secondary surface */
  --paper:#1A2A44;      /* card bg → mid navy */
  --ink:#E8E3D7;
  --ink-2:#C9C2B0;
  --muted:#8A9AAE;
  --line:#2A3D5C;
  --line-2:#3A4D6C;
}
html.dark body{background:#0E1A2C;color:#E8E3D7}
html.dark ::-webkit-scrollbar-thumb{background:#3A4D6C;border-color:#0E1A2C}

/* Override the hard-coded inline cream/paper backgrounds → dark surfaces */
html.dark [style*="background:#F7F4EE"],
html.dark [style*="background: #F7F4EE"],
html.dark [style*="background:\"#F7F4EE\""]{background:#0E1A2C !important}
html.dark [style*="background:#FBF9F4"],
html.dark [style*="background: #FBF9F4"]{background:#1A2A44 !important}
html.dark [style*="background:#EFEBE2"],
html.dark [style*="background: #EFEBE2"]{background:#152741 !important}

/* Navy → cream (text/headings) */
html.dark [style*="color:#152741"],
html.dark [style*="color: #152741"]{color:#E8E3D7 !important}
html.dark [style*="color:#3C3C3B"]{color:#D8D3C7 !important}
html.dark [style*="color:#5A5A58"]{color:#A9A39A !important}
html.dark [style*="color:#8A8A86"]{color:#8A9AAE !important}

/* Borders */
html.dark [style*="border:1px solid #E5E0D4"],
html.dark [style*="border: 1px solid #E5E0D4"]{border-color:#2A3D5C !important}
html.dark [style*="border:1px solid #EFEBE2"]{border-color:#22344E !important}
html.dark [style*="border:1px solid #D9D3C5"]{border-color:#3A4D6C !important}
html.dark [style*="border-bottom:1px solid #E5E0D4"]{border-bottom-color:#2A3D5C !important}
html.dark [style*="border-bottom:1px solid #EFEBE2"]{border-bottom-color:#22344E !important}
html.dark [style*="border-top:1px solid #EFEBE2"]{border-top-color:#22344E !important}
html.dark [style*="border-right:1px solid #EFEBE2"]{border-right-color:#22344E !important}
html.dark [style*="border-left:1px solid #EFEBE2"]{border-left-color:#22344E !important}

/* Soft tinted backgrounds — slightly mute em dark */
html.dark [style*="background:#DCE7F0"]{background:#1F3450 !important}
html.dark [style*="background:#C7DDCB"]{background:#22442B !important}
html.dark [style*="background:#F5D9A8"]{background:#5C4520 !important}
html.dark [style*="background:#DDEADE"]{background:#1E3825 !important}
html.dark [style*="background:#F4E0E0"]{background:#421C1C !important}
html.dark [style*="background:#F5E5CD"]{background:#3F3320 !important}

/* Inputs */
html.dark input, html.dark select, html.dark textarea{color:#E8E3D7}

/* Sidebar (já é navy escuro) — manter, só ajustar text */
html.dark [style*="background:#152741"]{background:#08111F !important}
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
/* Icon set — DM Sans-friendly, 1.6 stroke, currentColor */
const Icon = ({ name, size = 20, color = "currentColor", strokeWidth = 1.6 }) => {
  const p = { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: color, strokeWidth, strokeLinecap: "round", strokeLinejoin: "round" };
  switch (name) {
    case "home":      return (<svg {...p}><path d="M3 11l9-7 9 7v9a2 2 0 0 1-2 2h-4v-7h-6v7H5a2 2 0 0 1-2-2z"/></svg>);
    case "users":     return (<svg {...p}><circle cx="9" cy="8" r="3.5"/><path d="M2 21v-1a5.5 5.5 0 0 1 11 0v1"/><circle cx="17" cy="9" r="2.5"/><path d="M22 19v-.5a4 4 0 0 0-6-3.5"/></svg>);
    case "shield":    return (<svg {...p}><path d="M12 21s8-3.5 8-9.5V5l-8-3-8 3v6.5C4 17.5 12 21 12 21z"/></svg>);
    case "calendar":  return (<svg {...p}><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>);
    case "clipboard":return (<svg {...p}><rect x="6" y="4" width="12" height="18" rx="2"/><path d="M9 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1"/><path d="M9 11h6M9 15h6M9 19h4"/></svg>);
    case "wallet":    return (<svg {...p}><rect x="3" y="6" width="18" height="14" rx="2"/><path d="M3 10h18M16 15h2"/></svg>);
    case "swap":      return (<svg {...p}><path d="M7 16V4m0 0L4 7m3-3l3 3M17 8v12m0 0l3-3m-3 3l-3-3"/></svg>);
    case "cog":       return (<svg {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9 1.65 1.65 0 0 0 4.27 7.18l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6 1.65 1.65 0 0 0 10 3.09V3a2 2 0 1 1 4 0v.09A1.65 1.65 0 0 0 15 4.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>);
    case "logout":    return (<svg {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>);
    case "check":     return (<svg {...p}><path d="M5 12l5 5L20 7"/></svg>);
    case "x":         return (<svg {...p}><path d="M6 6l12 12M18 6L6 18"/></svg>);
    case "plus":      return (<svg {...p}><path d="M12 5v14M5 12h14"/></svg>);
    case "search":    return (<svg {...p}><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>);
    case "back":      return (<svg {...p}><path d="M15 18l-6-6 6-6"/></svg>);
    case "arr":       return (<svg {...p}><path d="M9 6l6 6-6 6"/></svg>);
    case "mail":      return (<svg {...p}><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 7 9-7"/></svg>);
    case "copy":      return (<svg {...p}><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2"/></svg>);
    case "send":      return (<svg {...p}><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>);
    case "trash":     return (<svg {...p}><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>);
    case "bell":      return (<svg {...p}><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9M10 21a2 2 0 0 0 4 0"/></svg>);
    case "trend":     return (<svg {...p}><path d="M3 17l6-6 4 4 8-8M14 7h7v7"/></svg>);
    case "clock":     return (<svg {...p}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>);
    case "menu":      return (<svg {...p}><path d="M4 6h16M4 12h16M4 18h16"/></svg>);
    case "edit":      return (<svg {...p}><path d="M11 4H5a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2h13a2 2 0 0 0 2-2v-6"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z"/></svg>);
    case "filter":    return (<svg {...p}><path d="M3 5h18M6 12h12M10 19h4"/></svg>);
    case "google":    return (<svg width={size} height={size} viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>);
    case "mark":      return (<svg width={size} height={size} viewBox="0 0 64 64" fill="none"><circle cx="32" cy="14" r="5" fill="#E8A13C"/><circle cx="32" cy="26" r="7.5" fill="#8DBF94"/><ellipse cx="26" cy="44" rx="13" ry="9" fill="#152741"/><ellipse cx="38" cy="46" rx="12" ry="8" fill="#B9CDE0"/></svg>);
    default: return null;
  }
};

window.Icon = Icon;


/* ═══ UI primitives — Casa da Psicomotricidade brand ═══ */
const { useState, useEffect, useRef, useMemo } = React;

const Mark = ({ size = 36 }) => (
  <svg width={size} height={size} viewBox="0 0 64 64" fill="none">
    <circle cx="32" cy="11" r="4.2" fill="#E8A13C"/>
    <circle cx="32" cy="23" r="6.8" fill="#8DBF94"/>
    <ellipse cx="25" cy="43" rx="13" ry="9" fill="#152741"/>
    <ellipse cx="38" cy="45.5" rx="12" ry="8" fill="#B9CDE0"/>
  </svg>
);

const Logo = ({ tone = "navy" }) => (
  <div style={{display:"flex",alignItems:"center",gap:12}}>
    <Mark size={36}/>
    <div style={{display:"flex",flexDirection:"column",lineHeight:1}}>
      <span style={{fontFamily:"DM Sans",fontWeight:700,fontSize:17,letterSpacing:"-0.01em",color:tone==="cream"?"#F7F4EE":"#152741"}}>PSICOMOTRI<span style={{fontWeight:400}}>CLINIC</span></span>
      <span className="mono" style={{color:tone==="cream"?"rgba(247,244,238,.5)":"#8A8A86",fontSize:9.5,marginTop:4}}>A CASA · CLÍNICA</span>
    </div>
  </div>
);

const Eyebrow = ({children, color="#8A8A86"}) => (
  <span className="mono" style={{color, fontSize:11, fontWeight:500}}>{children}</span>
);

const Av = ({ t, bg, sz = 40, color = "#152741" }) => (
  <div style={{
    width:sz, height:sz, borderRadius:sz*0.5,
    background:bg||"#DCE7F0",
    display:"flex", alignItems:"center", justifyContent:"center",
    fontFamily:"DM Sans", fontSize:sz*0.36, fontWeight:600,
    color, flexShrink:0, letterSpacing:"-0.01em"
  }}>{t}</div>
);

const Tag = ({children, type="default"}) => {
  const m = {
    realizada:["#DDEADE","#3D7A4A"],
    falta:["#F4E0E0","#B83A3A"],
    agendada:["#DCE7F0","#1E3556"],
    pago:["#DDEADE","#3D7A4A"],
    pendente:["#F5E5CD","#C97A1F"],
    director:["#EFEBE2","#152741"],
    professional:["#DDEADE","#3D7A4A"],
    parent:["#DCE7F0","#1E3556"],
    admin:["#152741","#F7F4EE"],
    default:["#EFEBE2","#3C3C3B"],
    amber:["#F5D9A8","#C97A1F"],
    sage:["#C7DDCB","#3D7A4A"],
  };
  const [bg,c] = m[type] || m.default;
  return (
    <span style={{
      display:"inline-flex", alignItems:"center",
      padding:"3px 9px", borderRadius:99,
      fontSize:11.5, fontWeight:500, letterSpacing:0,
      background:bg, color:c, lineHeight:1.4
    }}>{children}</span>
  );
};

const Card = ({children, style, onClick, hover, delay=0, pad=22}) => (
  <div className="ch fu" onClick={onClick} style={{
    background:"#FBF9F4",
    borderRadius:14,
    padding:pad,
    border:"1px solid #E5E0D4",
    cursor:onClick?"pointer":"default",
    animationDelay:`${delay}ms`,
    transition:"border-color .15s ease, box-shadow .15s ease, transform .12s ease",
    ...(onClick?{":hover":{borderColor:"#152741"}}:{}),
    ...style
  }}
  onMouseEnter={onClick?(e)=>{e.currentTarget.style.borderColor="#152741";e.currentTarget.style.boxShadow="0 4px 14px rgba(21,39,65,.06)";}:undefined}
  onMouseLeave={onClick?(e)=>{e.currentTarget.style.borderColor="#E5E0D4";e.currentTarget.style.boxShadow="none";}:undefined}
  >{children}</div>
);

const Stat = ({label, value, suffix, color="#152741", bg="#FBF9F4", trend, accent}) => (
  <div style={{
    background:bg, borderRadius:14, padding:"22px 22px 20px",
    border:"1px solid #E5E0D4", flex:1, position:"relative", overflow:"hidden"
  }}>
    {accent && <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:accent}}/>}
    <Eyebrow>{label}</Eyebrow>
    <div style={{display:"flex", alignItems:"baseline", gap:6, marginTop:10}}>
      <span className="serif" style={{fontSize:36, fontWeight:300, color, lineHeight:1, letterSpacing:"-0.03em"}}>{value}</span>
      {suffix && <span style={{fontFamily:"DM Sans",fontSize:14,color:"#8A8A86",fontWeight:500}}>{suffix}</span>}
    </div>
    {trend && <div style={{fontSize:12,color:"#8A8A86",marginTop:6}}>{trend}</div>}
  </div>
);

const Progress = ({pct, color="#152741", h=6, bg="#EFEBE2"}) => (
  <div style={{height:h, borderRadius:h/2, background:bg, overflow:"hidden"}}>
    <div style={{
      height:"100%", width:`${Math.min(pct,100)}%`,
      borderRadius:h/2, background:color,
      transition:"width .8s cubic-bezier(.4,0,.2,1)"
    }}/>
  </div>
);

const Section = ({eyebrow, title, sub, right}) => (
  <div style={{display:"flex", alignItems:"flex-end", justifyContent:"space-between", margin:"36px 0 18px", gap:16}}>
    <div style={{flex:1, minWidth:0}}>
      {eyebrow && <div style={{marginBottom:6}}><Eyebrow>{eyebrow}</Eyebrow></div>}
      <div className="serif" style={{fontSize:26, fontWeight:300, color:"#152741", lineHeight:1.1, letterSpacing:"-0.02em"}}>{title}</div>
      {sub && <div style={{fontSize:14, color:"#8A8A86", marginTop:4}}>{sub}</div>}
    </div>
    {right}
  </div>
);

const Empty = ({title, text, icon}) => (
  <Card style={{textAlign:"center", padding:"40px 24px", background:"#FBF9F4"}}>
    {icon && <div style={{marginBottom:12, display:"flex", justifyContent:"center", color:"#B9CDE0"}}>{icon}</div>}
    {title && <div className="serif-it" style={{fontSize:18,color:"#152741",marginBottom:6}}>{title}</div>}
    <div style={{fontSize:13.5, color:"#8A8A86"}}>{text}</div>
  </Card>
);

const Toast = ({msg, type="success"}) => {
  if (!msg) return null;
  const colors = {success:["#152741","#F7F4EE","#8DBF94"], error:["#B83A3A","#F7F4EE","#B83A3A"], info:["#1E3556","#F7F4EE","#B9CDE0"]};
  const [bg,c,bar] = colors[type] || colors.success;
  return (
    <div style={{
      position:"fixed", bottom:32, right:32,
      background:bg, color:c, padding:"14px 22px 14px 18px",
      borderRadius:12, fontSize:14, fontWeight:500,
      zIndex:999, boxShadow:"0 12px 36px rgba(21,39,65,.25)",
      animation:"ti .3s ease", maxWidth:380,
      borderLeft:`3px solid ${bar}`,
      display:"flex", alignItems:"center", gap:10
    }}>{msg}</div>
  );
};

const Btn = ({children, onClick, disabled, variant="primary", size="md", icon, style}) => {
  const variants = {
    primary:{bg:"#152741",c:"#F7F4EE",bd:"#152741",hbg:"#1E3556"},
    secondary:{bg:"#FBF9F4",c:"#152741",bd:"#D9D3C5",hbg:"#F7F4EE"},
    ghost:{bg:"transparent",c:"#152741",bd:"transparent",hbg:"#EFEBE2"},
    accent:{bg:"#E8A13C",c:"#152741",bd:"#E8A13C",hbg:"#D89030"},
    danger:{bg:"#FBF9F4",c:"#B83A3A",bd:"#F4E0E0",hbg:"#F4E0E0"},
  };
  const v = variants[variant] || variants.primary;
  const sizes = {sm:"8px 14px", md:"11px 20px", lg:"14px 26px"};
  const fs = {sm:13, md:14, lg:15};
  const [hover, setHover] = useState(false);
  return (
    <button
      onClick={disabled?undefined:onClick}
      disabled={disabled}
      className="ch"
      onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      style={{
        padding:sizes[size], borderRadius:10,
        border:`1px solid ${v.bd}`,

const CopyField = ({label, value, cols=1}) => {
  const [done, setDone] = useState(false);

    setTimeout(()=>setDone(false), 1500);

  return (
    <div style={{gridColumn: cols===2?"1 / -1":"auto", display:"flex",flexDirection:"column",gap:4}}>
      <div className="mono" style={{fontSize:10.5,color:"#8A8A86",letterSpacing:"0.06em",fontWeight:500}}>{label.toUpperCase()}</div>

            <div style={{padding:"14px 12px", background:"#EFEBE2", borderBottom:"1px solid #E5E0D4"}}><Eyebrow>Hora</Eyebrow></div>
            {DAYS.map(d => <div key={d} style={{padding:"14px 16px", background:"#EFEBE2", borderBottom:"1px solid #E5E0D4", borderLeft:"1px solid #E5E0D4"}}><Eyebrow>{d}</Eyebrow></div>)}
            {HOURS.map(h => (
              <React.Fragment key={h}>
                <div style={{padding:"14px 12px", borderBottom:"1px solid #EFEBE2", color:"#5A5A58", fontSize:13, fontWeight:500}} className="mono">{h}</div>
                {DAYS.map(d => {
                  const items = slot(d, h);
                  return (
                    <div key={d+h} style={{padding:8, borderLeft:"1px solid #EFEBE2", borderBottom:"1px solid #EFEBE2", minHeight:62, background: items.length===0?"transparent":"#FBF9F4"}}>
                      {items.map(p => {
                        const pr = dProfs.find(x=>x.id===p.professional_id);
                        return (
                          <div key={p.id} style={{padding:"7px 9px", borderRadius:7, background:pr?.avatar_color||"#DCE7F0", marginBottom:4, fontSize:12}}>
                            <div style={{fontWeight:500, color:"#152741"}}>{p.name}</div>
                            <div style={{color:"#5A5A58", fontSize:11, marginTop:1}}>{pr?.name?.split(" ")[0]} · {p.session_type==="individual"?"Indiv.":"Grupo"}</div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </React.Fragment>
            ))}
          </div>
        </Card>
      </div>
    );
  };

  /* ─── FINANCE ─── */
  const Finance = () => {
    const [filterMonth, setFilterMonth] = React.useState("todos");
    const months = Array.from(new Set(dPays.map(p=>p.month))).sort();
    const filtered = filterMonth==="todos" ? dPays : dPays.filter(p=>p.month===filterMonth);
    const tp = filtered.reduce((a,p)=>a+Number(p.amount),0);
    const pp = filtered.filter(p=>p.status==="pago").reduce((a,p)=>a+Number(p.amount),0);
    const pend = filtered.filter(p=>p.status==="pendente");
    const clinicCut = pp * CLINIC_CUT;
    const profCut = pp - clinicCut;

    return (
      <div style={{padding:"28px 40px 60px"}}>
        <div style={{display:"flex",justifyContent:"flex-end",gap:10,marginBottom:14}}>
          <Sel value={filterMonth} onChange={setFilterMonth} options={[{v:"todos",l:"Todos os meses"},...months.map(m=>({v:m,l:m}))]}/>
          <Btn icon={<Icon name="plus" size={16}/>} onClick={()=>{setForm({});setModal("addPayment");}}>Registar</Btn>
        </div>

        <div style={{display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:14, marginBottom:14}}>
          <Stat label="TOTAL FATURADO" value={tp.toLocaleString("pt-PT")} suffix="€" accent="#152741"/>
          <Stat label="RECEBIDO" value={pp.toLocaleString("pt-PT")} suffix="€" accent="#8DBF94"/>
          <Stat label="PENDENTE" value={(tp-pp).toLocaleString("pt-PT")} suffix="€" accent="#E8A13C"/>
        </div>

        {/* split */}
        <Card pad={22} style={{marginBottom:24}}>
          <Eyebrow>— DISTRIBUIÇÃO DO RECEBIDO</Eyebrow>
          <div style={{marginTop:14, display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:14, alignItems:"center"}}>
            <div>
              <div style={{fontSize:12, color:"#8A8A86", letterSpacing:"0.06em"}} className="mono">CLÍNICA · 25%</div>
              <div className="serif" style={{fontSize:30, fontWeight:300, color:"#152741", marginTop:4, letterSpacing:"-0.02em"}}>{clinicCut.toLocaleString("pt-PT",{maximumFractionDigits:0})}€</div>
            </div>
            <div>
              <div style={{fontSize:12, color:"#8A8A86", letterSpacing:"0.06em"}} className="mono">PROFISSIONAIS · 75%</div>
              <div className="serif" style={{fontSize:30, fontWeight:300, color:"#152741", marginTop:4, letterSpacing:"-0.02em"}}>{profCut.toLocaleString("pt-PT",{maximumFractionDigits:0})}€</div>
            </div>
            <div style={{paddingLeft:18, borderLeft:"1px solid #EFEBE2"}}>
              <div style={{fontSize:11, color:"#8A8A86", letterSpacing:"0.06em", marginBottom:6}} className="mono">NOTA</div>
              <div style={{fontSize:13, color:"#5A5A58", lineHeight:1.5}}>O profissional recebe o valor total dos responsáveis e transfere os 25% para a clínica.</div>
            </div>
          </div>
          {/* split por profissional */}
          <div style={{marginTop:18, paddingTop:18, borderTop:"1px solid #EFEBE2", display:"flex", flexDirection:"column", gap:8}}>
            {dProfs.map(pr => {
              const ptIds = dPts.filter(pt=>pt.professional_id===pr.id).map(p=>p.id);
              const recv = filtered.filter(p=>p.status==="pago" && ptIds.includes(p.patient_id)).reduce((a,p)=>a+Number(p.amount),0);
              const cc = recv * CLINIC_CUT;
              const pc = recv - cc;
              return (
                <div key={pr.id} style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", padding:"6px 0", alignItems:"center", fontSize:13.5}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}><Av t={pr.avatar_initials} bg={pr.avatar_color} sz={28}/><span style={{color:"#152741"}}>{pr.name}</span></div>
                  <span style={{color:"#5A5A58"}}>Recebido: <strong style={{color:"#152741"}}>{recv}€</strong></span>
                  <span style={{color:"#5A5A58"}}>P/ clínica: <strong style={{color:"#B83A3A"}}>{cc.toFixed(0)}€</strong></span>
                  <span style={{color:"#5A5A58"}}>P/ profissional: <strong style={{color:"#3D7A4A"}}>{pc.toFixed(0)}€</strong></span>
                </div>
              );
            })}
          </div>
        </Card>

        <Card pad={0}>
          <div style={{display:"grid", gridTemplateColumns:"2fr 1.2fr 1fr 1fr 1.4fr", padding:"14px 20px", background:"#EFEBE2", borderBottom:"1px solid #E5E0D4"}}>
            <Eyebrow>Paciente</Eyebrow><Eyebrow>Mês</Eyebrow><Eyebrow>Valor</Eyebrow><Eyebrow>Estado</Eyebrow><Eyebrow style={{textAlign:"right"}}>Acções</Eyebrow>
          </div>
          {filtered.map((p,i) => {
            const pt = dPts.find(x=>x.id===p.patient_id);
            return (
              <div key={p.id} style={{
                display:"grid", gridTemplateColumns:"2fr 1.2fr 1fr 1fr 1.4fr",
                padding:"14px 20px", alignItems:"center",
                borderBottom: i<filtered.length-1?"1px solid #EFEBE2":"none"
              }}>
                <span style={{fontSize:14, fontWeight:500, color:"#152741"}}>{pt?.name||"—"}</span>
                <span style={{fontSize:13.5, color:"#5A5A58"}}>{p.month}</span>
                <span className="serif" style={{fontSize:18, fontWeight:300, color:"#152741", letterSpacing:"-0.02em"}}>{p.amount}€</span>
                <span>
                  <button onClick={()=>togglePayment(p)} className="ch" style={{background:"none",border:"none",padding:0,cursor:"pointer"}} title="Clique para alternar estado">
                    <Tag type={p.status}>{p.status==="pago"?"Pago":"Pendente"}</Tag>
                  </button>
                </span>
                <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
                  {p.status==="pendente" ? (
                    <>
                      <Btn size="sm" variant="primary" icon={<Icon name="check" size={13}/>} onClick={()=>togglePayment(p)}>Marcar pago</Btn>
                      <Btn size="sm" variant="secondary" icon={<Icon name="mail" size={13}/>} onClick={()=>{setSelPay(p); setModal("whatsapp");}}>WhatsApp</Btn>
                    </>
                  ) : (
                    <Btn size="sm" variant="secondary" onClick={()=>togglePayment(p)}>Reverter</Btn>
                  )}
                </div>
              </div>
            );
          })}
          {filtered.length===0 && <div style={{padding:30, textAlign:"center", color:"#8A8A86", fontSize:13.5}}>Sem pagamentos para o filtro selecionado.</div>}
        </Card>
      </div>
    );
  };

  /* ─── REQUESTS ─── */
  const Requests = () => (
    <div style={{padding:"28px 40px 60px"}}>
      <Section eyebrow="— PEDIDOS" title={`Trocas de horário · ${dReqs.length}`} sub="Pedidos pendentes da equipa"/>
      {dReqs.length===0 && <Empty title="Tudo em ordem" text="Sem pedidos de troca pendentes." icon={<Icon name="check" size={32}/>}/>}
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {dReqs.map((r,i) => {
          const pr = dProfs.find(p=>p.id===r.professional_id);
          const pt = dPts.find(p=>p.id===r.patient_id);
          return (
            <Card key={r.id} delay={i*60} pad={22}>
              <div style={{display:"flex", alignItems:"center", gap:18}}>
                {pr && <Av t={pr.avatar_initials} bg={pr.avatar_color} sz={48}/>}
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                    <span style={{fontSize:15, fontWeight:500, color:"#152741"}}>{pr?.name||"—"}</span>
                    <Tag type="pendente">Pendente</Tag>
                  </div>
                  <div style={{fontSize:13.5, color:"#5A5A58", marginBottom:8}}>Paciente: <strong style={{color:"#152741"}}>{pt?.name||"—"}</strong></div>
                  <div style={{display:"flex",alignItems:"center",gap:10,fontSize:13}}>
                    <span style={{padding:"4px 10px", borderRadius:6, background:"#F4E0E0", color:"#B83A3A"}} className="mono">{r.from_schedule}</span>
                    <Icon name="arr" size={14} color="#8A8A86"/>
                    <span style={{padding:"4px 10px", borderRadius:6, background:"#DDEADE", color:"#3D7A4A"}} className="mono">{r.to_schedule}</span>
                  </div>
                  {r.reason && <div className="serif-it" style={{fontSize:14, color:"#5A5A58", marginTop:10, paddingLeft:12, borderLeft:"2px solid #B9CDE0"}}>"{r.reason}"</div>}
                </div>
                <div style={{display:"flex",gap:8}}>
                  <Btn variant="primary" icon={<Icon name="check" size={14}/>} onClick={async()=>{if(!demoFallback)await sb.from('schedule_requests').update({status:'aprovado'}).eq('id',r.id);show("Aprovado");await load();}}>Aprovar</Btn>
                  <Btn variant="secondary" onClick={async()=>{if(!demoFallback)await sb.from('schedule_requests').update({status:'recusado'}).eq('id',r.id);show("Recusado","error");await load();}}>Recusar</Btn>
                </div>
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );

  /* ─── SETTINGS ─── */
  const Settings = () => (
    <div style={{padding:"28px 40px 60px"}}>
      <Section eyebrow="— PREFERÊNCIAS" title="Definições" sub="Configurações da plataforma e da clínica"/>
      <div style={{display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:14}}>
        {[
          {t:"Convidar utilizador",d:"Criar conta e enviar credenciais de acesso",ic:"mail",ac:"#EFEBE2",m:"invite"},
          {t:"Adicionar profissional",d:"Registar novo terapeuta na equipa",ic:"users",ac:"#C7DDCB",m:"addProf"},
          {t:"Novo paciente",d:"Abrir caso clínico e definir horário",ic:"clipboard",ac:"#DCE7F0",m:"addPatient"},
          {t:"Registar pagamento",d:"Recibo emitido ou cobrança pendente",ic:"wallet",ac:"#F5D9A8",m:"addPayment"},
        ].map((a,i) => (
          <Card key={a.m} delay={i*40} pad={22} onClick={()=>{setForm({});setInviteResult(null);setModal(a.m);}}>
            <div style={{display:"flex", gap:16, alignItems:"center"}}>
              <div style={{width:52,height:52,borderRadius:12,background:a.ac,color:"#152741",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name={a.ic} size={22}/></div>
              <div style={{flex:1}}>
                <div style={{fontSize:15, fontWeight:500, color:"#152741"}}>{a.t}</div>
                <div style={{fontSize:13, color:"#8A8A86", marginTop:3}}>{a.d}</div>
              </div>
              <div style={{color:"#B9CDE0"}}><Icon name="arr" size={16}/></div>
            </div>
          </Card>
        ))}
      </div>

      <Section eyebrow="— SISTEMA" title="Sobre"/>
      <Card pad={26}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:24}}>
          <div><Eyebrow>VERSÃO</Eyebrow><div style={{fontSize:15,color:"#152741",marginTop:6,fontWeight:500}}>Brand v1.0 · Hub 2026.05</div></div>
          <div><Eyebrow>ADMINISTRADOR</Eyebrow><div style={{fontSize:15,color:"#152741",marginTop:6,fontWeight:500}}>{ADMIN_EMAIL}</div></div>
          <div><Eyebrow>WEB</Eyebrow><div style={{fontSize:15,color:"#152741",marginTop:6,fontWeight:500}}>acasadapsicomotricidade.pt</div></div>
        </div>
      </Card>
    </div>
  );

  // Map titles
  const titles = {
    dashboard:{e:"— VISÃO GERAL", t:"Dashboard", s:"Estado da clínica em tempo real"},
    users:{e:"— ACESSOS", t:"Utilizadores", s:"Gestão de contas e papéis"},
    team:{e:"— EQUIPA", t:"Profissionais", s:"Terapeutas e coordenação"},
    patients:{e:"— CLÍNICA", t:"Pacientes", s:"Casos em acompanhamento"},
    agenda:{e:"— TEMPO", t:"Agenda semanal", s:"Distribuição de sessões"},
    finance:{e:"— FINANCEIRO", t:"Pagamentos", s:"Recibos e cobranças"},
    requests:{e:"— OPERACIONAL", t:"Pedidos de troca", s:"Aprovações pendentes"},
    settings:{e:"— SISTEMA", t:"Definições", s:"Preferências e ações"},
  };

  let content, title;
  if (sub === "user-detail") { content = <UserDetail/>; title = {e:"— DETALHE", t:selUser?.full_name||"Utilizador", s:""}; }
  else if (sub === "prof") { content = <ProfDetail/>; title = {e:"— PROFISSIONAL", t:selProf?.name||"", s:selProf?.role_title}; }
  else if (sub === "patient-detail") { content = <PatientDetail/>; title = {e:"— PACIENTE", t:selPt?.name||"", s:selPt?.session_type==="individual"?"Individual":"Grupo"}; }
  else { title = titles[tab]; content = ({dashboard:<Dashboard/>,users:<Users/>,team:<Team/>,patients:<Patients/>,agenda:<Agenda/>,finance:<Finance/>,requests:<Requests/>,settings:<Settings/>})[tab]; }

  return (
    <div style={{display:"flex", minHeight:"100vh", background:"#F7F4EE"}}>
      <Sidebar active={tab} onChange={(t)=>{setTab(t);setSub(null);setSearch("");}} profile={profile} onLogout={onLogout} badges={{requests:dReqs.length, users:0}}/>
      <main style={{flex:1, minWidth:0}}>
        {!sub && title && <Topbar eyebrow={title.e} title={title.t} sub={title.s}/>}
        {content}
      </main>

      <Toast msg={toast?.m} type={toast?.t}/>

      {/* Modals */}
      <Modal open={modal==="invite"} onClose={()=>{setModal(null);setInviteResult(null);}} title={inviteResult?"Conta criada":"Convidar utilizador"} eyebrow="— NOVO ACESSO">
        {!inviteResult ? (
          <>
            <Field label="Nome completo"><Inp placeholder="Ex: João Silva" value={form.invName||""} onChange={e=>setForm(f=>({...f,invName:e.target.value}))}/></Field>
            <Field label="Email"><Inp type="email" placeholder="joao@email.pt" value={form.invEmail||""} onChange={e=>setForm(f=>({...f,invEmail:e.target.value}))}/></Field>
            <Field label="Papel"><Sel value={form.invRole||""} onChange={v=>setForm(f=>({...f,invRole:v}))} options={[{v:"professional",l:"Profissional"},{v:"parent",l:"Responsável"},{v:"director",l:"Diretora"}]}/></Field>
            <div style={{marginTop:18, display:"flex", gap:10, justifyContent:"flex-end"}}>
              <Btn variant="secondary" onClick={()=>setModal(null)}>Cancelar</Btn>
              <Btn onClick={inviteUser} disabled={!form.invName||!form.invEmail||!form.invRole}>Criar conta</Btn>
            </div>
          </>
        ) : (
          <>
            <div style={{padding:"14px 16px", background:"#DDEADE", borderRadius:10, color:"#3D7A4A", fontSize:13.5, marginBottom:18, display:"flex",alignItems:"center",gap:10}}>
              <Icon name="check" size={18}/> Conta criada com sucesso. Partilhe as credenciais com o utilizador.
            </div>
            <div style={{background:"#F7F4EE", borderRadius:10, padding:18, marginBottom:16, border:"1px solid #E5E0D4"}}>
              <div style={{marginBottom:14}}><Eyebrow>EMAIL</Eyebrow><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}><span style={{fontSize:14.5, color:"#152741"}}>{inviteResult.email}</span><button onClick={()=>copyText(inviteResult.email)} className="ch" style={{color:"#5A5A58", padding:4,display:"flex"}}><Icon name="copy" size={16}/></button></div></div>
              <div style={{marginBottom:14}}><Eyebrow>PASSWORD TEMPORÁRIA</Eyebrow><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}><span style={{fontFamily:"JetBrains Mono", fontSize:14, color:"#152741"}}>{inviteResult.pw}</span><button onClick={()=>copyText(inviteResult.pw)} className="ch" style={{color:"#5A5A58", padding:4,display:"flex"}}><Icon name="copy" size={16}/></button></div></div>
              <div><Eyebrow>PAPEL</Eyebrow><div style={{marginTop:6}}><Tag type={inviteResult.role}>{RL[inviteResult.role]}</Tag></div></div>
            </div>
            <div style={{display:"flex", gap:10, justifyContent:"flex-end"}}>
              <Btn variant="secondary" onClick={()=>copyText(`Olá ${inviteResult.name}, a sua conta na Psicomotriclinic está pronta. Email: ${inviteResult.email} · Password: ${inviteResult.pw}`)}>Copiar mensagem</Btn>
              <Btn onClick={()=>{setModal(null);setInviteResult(null);}}>Concluir</Btn>
            </div>
          </>
        )}
      </Modal>

      <Modal open={modal==="addProf"} onClose={()=>setModal(null)} title="Adicionar profissional" eyebrow="— NOVA EQUIPA">
        <Field label="Nome"><Inp placeholder="Ex: Maria Santos" value={form.name||""} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></Field>
        <Field label="Função"><Sel value={form.role||"Psicomotricista"} onChange={v=>setForm(f=>({...f,role:v}))} options={[{v:"Psicomotricista",l:"Psicomotricista"},{v:"Terapeuta Ocupacional",l:"Terapeuta Ocupacional"},{v:"Psicólogo/a",l:"Psicólogo/a"}]}/></Field>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:14}}>
          <Btn variant="secondary" onClick={()=>setModal(null)}>Cancelar</Btn>
          <Btn onClick={addProf} disabled={!form.name}>Adicionar</Btn>
        </div>
      </Modal>

      <Modal open={modal==="addPatient"} onClose={()=>setModal(null)} title="Novo paciente" eyebrow="— NOVO CASO">
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:12}}>
          <Field label="Nome"><Inp placeholder="Ex: Maria S." value={form.name||""} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></Field>
          <Field label="Idade"><Inp type="number" placeholder="12" value={form.age||""} onChange={e=>setForm(f=>({...f,age:e.target.value}))}/></Field>
          <Field label="Data nascimento"><Inp type="date" value={form.birth||""} onChange={e=>setForm(f=>({...f,birth:e.target.value}))}/></Field>
        </div>
        <Field label="NIF"><Inp placeholder="123456789" value={form.nif||""} onChange={e=>setForm(f=>({...f,nif:e.target.value}))}/></Field>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Field label="Nome da mãe"><Inp placeholder="Ex: Ana Silva" value={form.mother||""} onChange={e=>setForm(f=>({...f,mother:e.target.value}))}/></Field>
          <Field label="Nome do pai"><Inp placeholder="Ex: João Silva" value={form.father||""} onChange={e=>setForm(f=>({...f,father:e.target.value}))}/></Field>
        </div>
        <Field label="Médico que segue o caso"><Inp placeholder="Ex: Dr. Pedro Almeida (Pediatria)" value={form.doctor||""} onChange={e=>setForm(f=>({...f,doctor:e.target.value}))}/></Field>
        <Field label="Outros profissionais que seguem o caso" hint="Separe vários com vírgula"><Inp placeholder="Ex: Terapia da fala · Inês Castro" value={form.others||""} onChange={e=>setForm(f=>({...f,others:e.target.value}))}/></Field>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Field label="Seguro de saúde"><Inp placeholder="Ex: Médis" value={form.insName||""} onChange={e=>setForm(f=>({...f,insName:e.target.value}))}/></Field>
          <Field label="Número do seguro"><Inp placeholder="Ex: M-4421889" value={form.insNum||""} onChange={e=>setForm(f=>({...f,insNum:e.target.value}))}/></Field>
        </div>
        <Field label="Profissional"><Sel value={form.prof||""} onChange={v=>setForm(f=>({...f,prof:v}))} options={dProfs.map(p=>({v:p.id,l:p.name}))}/></Field>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
          <Field label="Tipo de intervenção"><Sel value={form.sessionType||"individual"} onChange={v=>setForm(f=>({...f,sessionType:v}))} options={[{v:"individual",l:"Individual"},{v:"grupo",l:"Grupo"}]}/></Field>
          <Field label="Dia"><Sel value={form.day||""} onChange={v=>setForm(f=>({...f,day:v}))} options={DAYS.map(d=>({v:d,l:d}))}/></Field>
          <Field label="Hora"><Sel value={form.hour||""} onChange={v=>setForm(f=>({...f,hour:v}))} options={HOURS.map(h=>({v:h,l:h}))}/></Field>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:14}}>
          <Btn variant="secondary" onClick={()=>setModal(null)}>Cancelar</Btn>
          <Btn onClick={addPatient} disabled={!form.name||!form.age||!form.prof||!form.sessionType||!form.day||!form.hour}>Criar caso</Btn>
        </div>
      </Modal>

      <Modal open={modal==="addPayment"} onClose={()=>setModal(null)} title="Registar pagamento" eyebrow="— FINANCEIRO">
        <Field label="Paciente"><Sel value={form.pt||""} onChange={v=>setForm(f=>({...f,pt:v}))} options={dPts.map(p=>({v:p.id,l:p.name}))}/></Field>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
          <Field label="Valor (€)"><Inp type="number" placeholder="220" value={form.amount||""} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/></Field>
          <Field label="Mês"><Sel value={form.payMonth||"Maio 2026"} onChange={v=>setForm(f=>({...f,payMonth:v}))} options={["Abril 2026","Maio 2026","Junho 2026"].map(m=>({v:m,l:m}))}/></Field>
          <Field label="Estado"><Sel value={form.paySt||"pendente"} onChange={v=>setForm(f=>({...f,paySt:v}))} options={[{v:"pago",l:"Pago"},{v:"pendente",l:"Pendente"}]}/></Field>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:14}}>
          <Btn variant="secondary" onClick={()=>setModal(null)}>Cancelar</Btn>
          <Btn onClick={addPayment} disabled={!form.pt||!form.amount}>Registar</Btn>
        </div>
      </Modal>

      <Modal open={modal==="whatsapp"} onClose={()=>{setModal(null);setSelPay(null);}} title="Mensagem de cobrança" eyebrow="— WHATSAPP">
        {selPay && (() => {
          const pt = dPts.find(x=>x.id===selPay.patient_id);
          const phone = pt?.parent_phone || "";
          // sessões do paciente no mês da cobrança (ex: "Abril 2026")
          const monthMap = {"Janeiro":"01","Fevereiro":"02","Março":"03","Abril":"04","Maio":"05","Junho":"06","Julho":"07","Agosto":"08","Setembro":"09","Outubro":"10","Novembro":"11","Dezembro":"12"};
          const [mName, mYear] = (selPay.month||"").split(" ");
          const mPrefix = mYear && mName ? `${mYear}-${monthMap[mName]||""}` : "";
          const sessOfMonth = dSess.filter(s => s.patient_id===selPay.patient_id && s.date.startsWith(mPrefix));
          const fmtD = (iso) => { const [y,m,d]=iso.split("-"); return `${d}/${m}`; };
          const presentes = sessOfMonth.filter(s=>s.status==="realizada").map(s=>fmtD(s.date));
          const faltas = sessOfMonth.filter(s=>s.status==="falta").map(s=>fmtD(s.date));
          const msg = WA_TEMPLATES[waVariant](pt?.name || "", selPay.amount, {presentes, faltas});
          const waUrl = `https://wa.me/${phone.replace(/[^0-9]/g,'')}?text=${encodeURIComponent(msg)}`;
          return (
            <>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
                <div><Eyebrow>Paciente</Eyebrow><div style={{fontSize:14,color:"#152741",marginTop:4,fontWeight:500}}>{pt?.name||"—"}</div></div>
                <div><Eyebrow>Contacto</Eyebrow><div style={{fontSize:14,color:"#152741",marginTop:4,fontWeight:500}}>{phone||<span style={{color:"#B9B5AB"}}>sem número</span>}</div></div>
                <div><Eyebrow>Valor em dívida</Eyebrow><div className="serif" style={{fontSize:24,fontWeight:300,color:"#B83A3A",marginTop:2}}>{selPay.amount}€</div></div>
                <div><Eyebrow>Mês</Eyebrow><div style={{fontSize:14,color:"#152741",marginTop:4}}>{selPay.month}</div></div>
              </div>
              <Eyebrow>— VARIANTE DE MENSAGEM</Eyebrow>
              <div style={{display:"flex",gap:6,margin:"8px 0 12px"}}>
                {WA_TEMPLATES.map((_,i) => (
                  <button key={i} onClick={()=>setWaVariant(i)} className="ch" style={{
                    flex:1, padding:"8px 6px", borderRadius:8, fontSize:12,
                    border: i===waVariant ? "1px solid #152741" : "1px solid #E5E0D4",
                    background: i===waVariant ? "#152741" : "#FFF",
                    color: i===waVariant ? "#FBF9F4" : "#5A5A58",
                    cursor:"pointer"
                  }}>Variante {i+1}</button>
                ))}
              </div>
              <Eyebrow>— PRÉ-VISUALIZAÇÃO</Eyebrow>
              <div style={{marginTop:8, padding:16, background:"#E7F3DC", borderRadius:10, fontSize:14, color:"#152741", lineHeight:1.55, border:"1px solid #C7DDCB"}}>{msg}</div>
              <div style={{display:"flex",gap:10,justifyContent:"space-between",alignItems:"center",marginTop:18}}>
                <Btn variant="secondary" size="sm" icon={<Icon name="copy" size={13}/>} onClick={()=>{navigator.clipboard.writeText(msg);show("Mensagem copiada");}}>Copiar texto</Btn>
                <div style={{display:"flex",gap:10}}>
                  <Btn variant="secondary" onClick={()=>{setModal(null);setSelPay(null);}}>Fechar</Btn>
                  <Btn onClick={()=>{window.open(waUrl,"_blank");}} icon={<Icon name="send" size={14}/>} disabled={!phone}>Abrir WhatsApp</Btn>
                </div>
              </div>
            </>
          );
        })()}
      </Modal>
    </div>
  );
};

const ProfessionalPortal = ({ profile, onLogout }) => {
  const data = window.getDemoData();
  const myProf = data.profs.find(p => p.id === profile.professional_id) || data.profs[0];
  const myPts = data.pts.filter(p => p.professional_id === myProf.id);
  const myPays = data.pays.filter(py => myPts.some(p => p.id === py.patient_id));
  const [sessions, setSessions] = useState(data.sess.filter(s => myPts.some(p => p.id === s.patient_id)));
  const [tab, setTab] = useState("calendar");
  const [waModal, setWaModal] = useState(null); // {pt, amount}
  const [waVariant, setWaVariant] = useState(0);
  const [copied, setCopied] = useState(false);
  // weekOffset: 0 = semana actual, -1 anterior, +1 seguinte…
  const [weekOffset, setWeekOffset] = useState(0);

  // Estado das sessões fixas/recorrentes — chave: `${ptId}|${YYYY-MM-DD}` → status
  // Pré-carrega o que existir em sessions[] para retro-compatibilidade.
  const [recur, setRecur] = useState(() => {
    const m = {};
    sessions.forEach(s => { m[`${s.patient_id}|${s.date}`] = s.status; });
    return m;
  });

  // ─── helpers de semana ───
  const getMonday = (offset = 0) => {
    const d = new Date();
    const day = d.getDay() || 7; // 1..7 (segunda..domingo)
    d.setDate(d.getDate() - (day - 1) + offset * 7);
    d.setHours(0,0,0,0);
    return d;
  };
  const monday = getMonday(weekOffset);
  const dayMap = {Segunda:0, Terça:1, Quarta:2, Quinta:3, Sexta:4};
  const weekDates = DAYS.map((_,i) => {
    const d = new Date(monday); d.setDate(d.getDate()+i); return d;
  });
  const fmt = (d) => d.toISOString().slice(0,10);
  const fmtPt = (d) => `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
  const weekLabel = (() => {
    const a = weekDates[0], b = weekDates[4];
    const sameMonth = a.getMonth() === b.getMonth();
    const m1 = a.toLocaleDateString("pt-PT",{month:"long"});
    const m2 = b.toLocaleDateString("pt-PT",{month:"long"});
    return sameMonth
      ? `${a.getDate()}–${b.getDate()} ${m1}`
      : `${a.getDate()} ${m1} – ${b.getDate()} ${m2}`;
  })();

  const setSlot = (ptId, dateStr, status) => {
    setRecur(prev => ({...prev, [`${ptId}|${dateStr}`]: status}));
  };

  // grelha: cada paciente individual ocupa um slot day×hour
  const slotMap = {};
  myPts.forEach(pt => {
    if (pt.session_type !== "individual" && pt.session_type !== "grupo") return;
    const di = dayMap[pt.day_of_week];
    if (di === undefined) return;
    const key = `${di}|${pt.hour}`;
    slotMap[key] = pt;
  });

  // contagem desta semana
  const thisWeekKeys = myPts.map(pt => {
    const di = dayMap[pt.day_of_week]; if (di === undefined) return null;
    return `${pt.id}|${fmt(weekDates[di])}`;
  }).filter(Boolean);
  const wkRealizadas = thisWeekKeys.filter(k => recur[k] === "realizada").length;
  const wkFaltas = thisWeekKeys.filter(k => recur[k] === "falta").length;
  const wkPendentes = thisWeekKeys.filter(k => !recur[k] || recur[k] === "agendada").length;

  // financeiro: conta TODAS as sessões realizadas em recur
  const totalRealizadas = Object.values(recur).filter(s => s === "realizada").length;
  const total = totalRealizadas * myProf.hourly_rate;
  const clinic = total * CLINIC_CUT;
  const profCut = total - clinic;

  // ─── visible hours: só horas ocupadas + bordas ───
  const usedHours = Array.from(new Set(myPts.map(p => p.hour))).sort();
  const visibleHours = usedHours.length ? usedHours : HOURS;

  return (
    <div style={{minHeight:"100vh", background:"#F7F4EE", display:"flex", flexDirection:"column"}}>
      <div style={{padding:"22px 40px", borderBottom:"1px solid #E5E0D4", background:"#FBF9F4", display:"flex", justifyContent:"space-between", alignItems:"center"}}>
        <Logo/>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{textAlign:"right", whiteSpace:"nowrap"}}>
            <div style={{fontSize:13.5,fontWeight:500,color:"#152741"}}>{myProf.name}</div>
            <div style={{fontSize:11.5,color:"#8A8A86"}}>{myProf.role_title}</div>
          </div>
          <Av t={myProf.avatar_initials} bg={myProf.avatar_color}/>
          <button onClick={onLogout} className="ch" style={{padding:8, color:"#5A5A58",display:"flex",borderRadius:8,background:"none",border:"none",cursor:"pointer"}}><Icon name="logout" size={18}/></button>
        </div>
      </div>

      <div style={{maxWidth:1200, margin:"0 auto", padding:"32px 40px 60px", width:"100%"}}>
        <Section eyebrow="— PROFISSIONAL" title={`Olá, ${myProf.name.split(" ")[0]}.`} sub="Pique as sessões à medida que vão acontecendo."/>

        {/* navtabs */}
        <div style={{display:"flex",gap:6,marginBottom:24,borderBottom:"1px solid #E5E0D4"}}>
          {[{id:"calendar",l:"Calendário"},{id:"history",l:"Histórico"},{id:"finance",l:"Financeiro"},{id:"cobranca",l:"Cobranças"},{id:"recibos",l:"Recibos AT"},{id:"patients",l:"Pacientes"}].map(t => (
            <button key={t.id} onClick={()=>setTab(t.id)} className="ch" style={{
              padding:"12px 18px", border:"none", background:"none", cursor:"pointer",
              fontSize:14, fontWeight:500,
              color: tab===t.id ? "#152741" : "#8A8A86",
              borderBottom: tab===t.id ? "2px solid #152741" : "2px solid transparent",
              marginBottom:-1
            }}>{t.l}</button>
          ))}
        </div>

        {tab === "calendar" && (
          <div>
            {/* Navegação de semana */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,gap:14,flexWrap:"wrap"}}>
              <div className="serif" style={{fontSize:20,fontWeight:300,color:"#152741",letterSpacing:"-0.01em",textTransform:"capitalize",whiteSpace:"nowrap"}}>{weekLabel}</div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <button onClick={()=>setWeekOffset(w=>w-1)} className="ch" style={{padding:"8px 12px",borderRadius:8,background:"#FBF9F4",border:"1px solid #E5E0D4",cursor:"pointer",display:"flex",alignItems:"center",gap:6,fontSize:13,color:"#5A5A58",whiteSpace:"nowrap"}}><Icon name="back" size={14}/> Anterior</button>
                <button onClick={()=>setWeekOffset(0)} className="ch" style={{padding:"8px 14px",borderRadius:8,background: weekOffset===0?"#152741":"#FBF9F4",color: weekOffset===0?"#F7F4EE":"#5A5A58",border:"1px solid "+(weekOffset===0?"#152741":"#E5E0D4"),cursor:"pointer",fontSize:13,whiteSpace:"nowrap"}}>Esta semana</button>
                <button onClick={()=>setWeekOffset(w=>w+1)} className="ch" style={{padding:"8px 12px",borderRadius:8,background:"#FBF9F4",border:"1px solid #E5E0D4",cursor:"pointer",display:"flex",alignItems:"center",gap:6,fontSize:13,color:"#5A5A58",whiteSpace:"nowrap"}}>Seguinte <Icon name="arr" size={14}/></button>
              </div>
            </div>

            {/* Stats da semana */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:18}}>
              <Stat label="SESSÕES FIXAS" value={thisWeekKeys.length} accent="#152741"/>
              <Stat label="REALIZADAS" value={wkRealizadas} accent="#3D7A4A"/>
              <Stat label="FALTAS" value={wkFaltas} accent="#B83A3A"/>
              <Stat label="POR CONFIRMAR" value={wkPendentes} accent="#E8A13C"/>
            </div>

            {/* Grelha semanal */}
            <Card pad={0} style={{overflow:"hidden"}}>
              {/* header dias */}
              <div style={{display:"grid",gridTemplateColumns:"80px repeat(5,1fr)",background:"#EFEBE2",borderBottom:"1px solid #E5E0D4"}}>
                <div style={{padding:"12px 10px"}}><Eyebrow>Hora</Eyebrow></div>
                {DAYS.map((d,i) => {
                  const today = new Date(); today.setHours(0,0,0,0);
                  const isToday = weekDates[i].getTime() === today.getTime();
                  return (
                    <div key={d} style={{padding:"12px 10px",borderLeft:"1px solid #E5E0D4",textAlign:"center"}}>
                      <div style={{fontSize:11,color:"#8A8A86",letterSpacing:"0.06em",fontWeight:500}} className="mono">{d.toUpperCase()}</div>
                      <div className="serif" style={{fontSize:18,fontWeight:isToday?500:300,color:isToday?"#E8A13C":"#152741",marginTop:2,letterSpacing:"-0.02em"}}>{fmtPt(weekDates[i])}</div>
                    </div>
                  );
                })}
              </div>
              {/* linhas hora */}
              {visibleHours.map(h => (
                <div key={h} style={{display:"grid",gridTemplateColumns:"80px repeat(5,1fr)",borderBottom:"1px solid #EFEBE2",minHeight:84}}>
                  <div style={{padding:"12px 10px",background:"#FBF9F4",display:"flex",alignItems:"flex-start"}}>
                    <span className="mono" style={{fontSize:12,color:"#8A8A86"}}>{h}</span>
                  </div>
                  {DAYS.map((d,di) => {
                    const pt = slotMap[`${di}|${h}`];
                    const dateStr = fmt(weekDates[di]);
                    const status = pt ? (recur[`${pt.id}|${dateStr}`] || "agendada") : null;
                    if (!pt) {
                      return <div key={d} style={{borderLeft:"1px solid #EFEBE2",background:"#FBF9F4"}}/>;
                    }
                    const styleByStatus = {
                      realizada: {bg:"#DDEADE", border:"#8DBF94", color:"#3D7A4A", chip:"Realizada"},
                      falta:     {bg:"#F4E0E0", border:"#D9A0A0", color:"#B83A3A", chip:"Falta"},
                      agendada:  {bg:"#FBF9F4", border:"#D9D3C5", color:"#5A5A58", chip:"Por confirmar"},
                    }[status];
                    return (
                      <div key={d} style={{
                        borderLeft:"1px solid #EFEBE2",
                        padding:8,
                        background: styleByStatus.bg,
                        position:"relative",
                        transition:"background .2s"
                      }}>
                        <div style={{borderLeft:`3px solid ${styleByStatus.border}`, paddingLeft:8}}>
                          <div style={{fontSize:13,fontWeight:500,color:"#152741",marginBottom:2}}>{pt.name}</div>
                          <div style={{fontSize:11,color:"#8A8A86",marginBottom:8}}>{pt.session_type==="individual"?"Individual":"Grupo"} · {myProf.hourly_rate}€</div>
                          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                            <button onClick={()=>setSlot(pt.id, dateStr, "realizada")} title="Realizada" className="ch" style={{
                              padding:"4px 8px",borderRadius:6,fontSize:11,fontWeight:500,cursor:"pointer",
                              background: status==="realizada"?"#3D7A4A":"#FFF",
                              color: status==="realizada"?"#F7F4EE":"#3D7A4A",
                              border:"1px solid "+(status==="realizada"?"#3D7A4A":"#C7DDCB")
                            }}>✓</button>
                            <button onClick={()=>setSlot(pt.id, dateStr, "falta")} title="Falta" className="ch" style={{
                              padding:"4px 8px",borderRadius:6,fontSize:11,fontWeight:500,cursor:"pointer",
                              background: status==="falta"?"#B83A3A":"#FFF",
                              color: status==="falta"?"#F7F4EE":"#B83A3A",
                              border:"1px solid "+(status==="falta"?"#B83A3A":"#D9A0A0")
                            }}>✕</button>
                            <button onClick={()=>setSlot(pt.id, dateStr, "agendada")} title="Reset" className="ch" style={{
                              padding:"4px 8px",borderRadius:6,fontSize:11,fontWeight:500,cursor:"pointer",
                              background: "#FFF",
                              color: "#8A8A86",
                              border:"1px solid #E5E0D4"
                            }}>↺</button>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              ))}
            </Card>

            <div style={{marginTop:12,display:"flex",gap:18,fontSize:12,color:"#5A5A58"}}>
              <span style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:12,height:12,borderRadius:3,background:"#DDEADE",border:"1px solid #8DBF94"}}/>Realizada</span>
              <span style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:12,height:12,borderRadius:3,background:"#F4E0E0",border:"1px solid #D9A0A0"}}/>Falta</span>
              <span style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:12,height:12,borderRadius:3,background:"#FBF9F4",border:"1px solid #D9D3C5"}}/>Por confirmar</span>
              <span style={{marginLeft:"auto",fontStyle:"italic"}}>As sessões fixas são geradas automaticamente a partir do horário recorrente de cada paciente.</span>
            </div>
          </div>
        )}

        {tab === "history" && (
          <div>
            <Card pad={22} style={{marginBottom:18}}>
              <Eyebrow>— HISTÓRICO DE SESSÕES</Eyebrow>
              <div style={{fontSize:13.5, color:"#5A5A58", marginTop:6, marginBottom:14, lineHeight:1.5}}>Lista cronológica de todas as sessões registadas.</div>
              <div style={{display:"flex",flexDirection:"column",gap:0}}>
                {Object.entries(recur).sort((a,b)=>b[0].localeCompare(a[0])).map(([k,st]) => {
                  const [pid, date] = k.split("|");
                  const pt = myPts.find(p => p.id === pid);
                  if (!pt) return null;
                  return (

                    <div style={{fontSize:11,color:"#8A8A86",letterSpacing:"0.06em"}} className="mono">PARA</div>
                    <div style={{fontSize:14,color:"#152741",fontWeight:500,marginTop:2}}>{waModal.pt.parent_mother}</div>
                    <div className="mono" style={{fontSize:12,color:"#5A5A58",marginTop:2}}>{waModal.pt.parent_phone}</div>

                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:11,color:"#8A8A86",letterSpacing:"0.06em"}} className="mono">VALOR</div>
                    <div className="serif" style={{fontSize:24,fontWeight:300,color:"#B83A3A",letterSpacing:"-0.02em",marginTop:2}}>{waModal.amount}€</div>

                <div style={{display:"flex",gap:6,margin:"8px 0 12px"}}>
                  {window.WA_TEMPLATES.map((_,i) => (
                    <button key={i} onClick={()=>setWaVariant(i)} className="ch" style={{
                      flex:1, padding:"8px 6px", borderRadius:8, fontSize:12,
                      background: waVariant===i ? "#152741" : "#FBF9F4",
                      color: waVariant===i ? "#F7F4EE" : "#5A5A58",
                      border: "1px solid "+(waVariant===i ? "#152741" : "#E5E0D4"),
                      cursor:"pointer", fontWeight:500
                    }}>Variante {i+1}</button>
                  ))}
                </div>
                <div style={{padding:14,background:"#FBF9F4",border:"1px solid #E5E0D4",borderRadius:10,fontSize:13.5,lineHeight:1.6,color:"#152741",minHeight:90,whiteSpace:"pre-wrap"}}>{msg}</div>
                <div style={{marginTop:14,display:"flex",gap:10,justifyContent:"flex-end"}}>
                  <Btn variant="secondary" onClick={()=>{navigator.clipboard.writeText(msg);setCopied(true);setTimeout(()=>setCopied(false),2000);}}>{copied?"✓ Copiado":"Copiar texto"}</Btn>
                  <Btn icon={<Icon name="msg" size={14}/>} onClick={()=>{window.open(waUrl,"_blank");}}>Abrir WhatsApp</Btn>

          })()}
        </Modal>
      </div>
    </div>
  );
};

          </div>
          <Av t={profile?.full_name?.split(" ").map(w=>w[0]).join("").slice(0,2)||"?"} bg="#F5D9A8"/>

        </div>
      </div>

      <div style={{maxWidth:1000, margin:"0 auto", padding:"32px 40px 60px", width:"100%"}}>

        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:24}}>

          <Stat label="EM DÍVIDA" value={pendente.toLocaleString("pt-PT")} suffix="€" accent="#B83A3A"/>
          <Stat label="JÁ PAGO" value={pago.toLocaleString("pt-PT")} suffix="€" accent="#152741"/>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18,marginBottom:18}}>
          {visiblePts.map(pt => {
            const pr = data.profs.find(p => p.id === pt.professional_id);

              <Card key={pt.id} pad={22}>

                <div style={{fontSize:13.5,color:"#5A5A58",marginTop:6}}>{pt.age} anos · {pt.day_of_week} · {pt.hour}</div>
                <div style={{marginTop:14, paddingTop:14, borderTop:"1px solid #EFEBE2", display:"flex", alignItems:"center", gap:10}}>

                    <div style={{fontSize:13.5,color:"#152741",fontWeight:500}}>{pr?.name}</div>
                    <div style={{fontSize:11.5,color:"#8A8A86"}}>{pr?.role_title}</div>

              </Card>

              <div key={p.id} style={{display:"grid",gridTemplateColumns:"2fr 1.2fr 1fr 1fr",padding:"14px 20px",alignItems:"center",borderBottom: i<myPays.length-1?"1px solid #EFEBE2":"none"}}>
                <span style={{fontSize:14,fontWeight:500,color:"#152741"}}>{pt?.name||"—"}</span>
                <span style={{fontSize:13.5,color:"#5A5A58"}}>{p.month}</span>
                <span className="serif" style={{fontSize:18,fontWeight:300,color:"#152741",letterSpacing:"-0.02em"}}>{p.amount}€</span>
                <span style={{textAlign:"right"}}><Tag type={p.status}>{p.status==="pago"?"Pago":"Pendente"}</Tag></span>
              </div>
            );
          })}
          {myPays.length === 0 && <div style={{padding:30,textAlign:"center",color:"#8A8A86",fontSize:13.5}}>Sem pagamentos registados.</div>}
        </Card>

        <Card pad={22}>
          <Eyebrow>— ÚLTIMAS SESSÕES</Eyebrow>
          <div style={{marginTop:12,display:"flex",flexDirection:"column",gap:6}}>
            {mySess.slice(0,8).map(s => {
              const pt = visiblePts.find(x => x.id === s.patient_id);
              return (
                <div key={s.id} style={{display:"grid",gridTemplateColumns:"1fr 2fr 1fr",padding:"8px 0",borderBottom:"1px solid #EFEBE2",alignItems:"center",gap:10}}>
                  <span className="mono" style={{fontSize:11,color:"#8A8A86"}}>{s.date}</span>
                  <span style={{fontSize:13.5,color:"#152741"}}>{pt?.name}</span>
                  <span style={{textAlign:"right"}}><Tag type={s.status==="realizada"?"sage":s.status==="falta"?"amber":"default"}>{s.status}</Tag></span>
                </div>
              );
            })}
          </div>
        </Card>
      </div>
    </div>
  );
};

const SB_URL = 'https://biowckwcgvgjccnqelmn.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpb3dja3djZ3ZnamNjbnFlbG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyODE3NTAsImV4cCI6MjA5MDg1Nzc1MH0.rqji9jY4bMWQjBcR_NbDehI2MexhlL9jRuIUZNA6GKA';
const ADMIN_EMAIL = 'manuelsousamarrao@gmail.com';
const sb = window.supabase.createClient(SB_URL, SB_KEY);

function App() {
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);

  // ─── Tweaks: theme + acentos ───
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "light",
    "accent": "amber"
  }/*EDITMODE-END*/;
  const [tweaks, setTweak] = window.useTweaks ? window.useTweaks(TWEAK_DEFAULTS) : [TWEAK_DEFAULTS, ()=>{}];

  // aplica classe ao <html> em função do tema
  useEffect(() => {
    const cls = "dark";
    if (tweaks.theme === "dark") document.documentElement.classList.add(cls);
    else document.documentElement.classList.remove(cls);
  }, [tweaks.theme]);

  // Demo mode — perfil simulado via localStorage
  const readDemo = () => {
    try {
      const raw = localStorage.getItem("demo_profile");
      return raw ? JSON.parse(raw) : null;
    } catch { return null; }
  };

  const getProfile = async (user) => {
    if (!user) return null;
    const meta = user.user_metadata || {};
    const fallbackRole = (meta.role === "pending_director" ? "director" : meta.role) || (user.email === ADMIN_EMAIL ? "director" : "parent");
    const fallback = { id:user.id, email:user.email, full_name:meta.full_name||user.email?.split('@')[0]||'Utilizador', role: fallbackRole };
    const withTimeout = (p, ms=2500) => Promise.race([p, new Promise(r => setTimeout(() => r({timeout:true}), ms))]);
    try {
      const res = await withTimeout(sb.from('profiles').select('*').eq('id', user.id).maybeSingle());
      if (res?.timeout) { console.warn('profiles read timeout — a usar fallback'); return fallback; }
      const data = res?.data;
      if (data) {
        if (data.role === "pending_director") {
          withTimeout(sb.from('profiles').update({ role: "director" }).eq('id', user.id)).catch(()=>{});
          return { ...data, role: "director" };
        }
        return data;
      }
      const up = await withTimeout(sb.from('profiles').upsert(fallback).select().maybeSingle());
      if (up?.timeout) return fallback;
      return up?.data || fallback;
    } catch(e) {
      console.error(e);
      return fallback;
    }
  };

  useEffect(() => {
    // se houver perfil demo, usa-o e ignora o supabase
    const demo = readDemo();
    if (demo) { setProfile(demo); setLoading(false); return; }

    // safety: nunca ficar preso a carregar mais de 4s
    const safety = setTimeout(() => setLoading(false), 4000);
    sb.auth.getSession().then(async ({data:{session}}) => {
      try { if (session?.user) setProfile(await getProfile(session.user)); } catch(e) { console.error(e); }
      clearTimeout(safety); setLoading(false);
    }).catch(() => { clearTimeout(safety); setLoading(false); });

    const { data:{subscription} } = sb.auth.onAuthStateChange(async (ev, session) => {
      try {
        if (ev === 'SIGNED_IN' && session?.user) { setProfile(await getProfile(session.user)); setLoading(false); }
        else if (ev === 'SIGNED_OUT') setProfile(null);
      } catch(e) { console.error(e); setLoading(false); }
    });
    return () => subscription.unsubscribe();
  }, []);

  const logout = async () => { localStorage.removeItem("demo_profile"); await sb.auth.signOut(); setProfile(null); };

  if (loading) return (
    <div style={{minHeight:"100vh", background:"#152741", display:"flex", alignItems:"center", justifyContent:"center"}}>
      <div style={{textAlign:"center", color:"#F7F4EE"}}>
        <Mark size={56}/>
        <div className="mono" style={{color:"rgba(247,244,238,.5)", marginTop:16}}>— A CARREGAR</div>
      </div>
    </div>
  );

  if (!profile) return (
    <>
      <Login sb={sb} ADMIN_EMAIL={ADMIN_EMAIL}/>
      <TweaksUI tweaks={tweaks} setTweak={setTweak}/>
    </>
  );

  const portal =
    (profile.role === "director" || profile.email === ADMIN_EMAIL)
      ? <AdminPortal profile={profile} onLogout={logout} sb={sb} ADMIN_EMAIL={ADMIN_EMAIL}/>
      : profile.role === "professional"
        ? <ProfessionalPortal profile={profile} onLogout={logout}/>
        : <ParentPortal profile={profile} onLogout={logout}/>;

  return (
    <>
      {portal}
      <TweaksUI tweaks={tweaks} setTweak={setTweak}/>
    </>
  );
}

const TweaksUI = ({ tweaks, setTweak }) => {
  const TweaksPanel = window.TweaksPanel;
  const TweakSection = window.TweakSection;
  const TweakRadio = window.TweakRadio;
  const TweakSelect = window.TweakSelect;
  if (!TweaksPanel) return null;
  return (
    <TweaksPanel title="Tweaks" subtitle="Aspeto e tema">
      <TweakSection title="Tema">
        <TweakRadio
          label="Modo"
          value={tweaks.theme}
          onChange={v => setTweak("theme", v)}
          options={[{value:"light", label:"Claro"}, {value:"dark", label:"Escuro"}]}
        />
      </TweakSection>
      <TweakSection title="Acento">
        <TweakSelect
          label="Cor de destaque"
          value={tweaks.accent}
          onChange={v => setTweak("accent", v)}
          options={[
            {value:"amber", label:"Âmbar (padrão)"},
            {value:"sage", label:"Verde-sálvia"},
            {value:"sky", label:"Azul-céu"},
            {value:"navy", label:"Marinho"},
          ]}
        />
      </TweakSection>
    </TweaksPanel>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

</script>
