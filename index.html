   SUPABASE HELPERS
   ═══════════════════════════════════════════ */
async function sbGetProfile(userId) {
  if (!sb) return null;
  const { data } = await sb.from('profiles').select('*').eq('id', userId).single();
  return data;
}

async function sbEnsureProfile(user) {
  if (!sb || !user) return null;
  let profile = await sbGetProfile(user.id);
  if (profile) return profile;
  // Criar perfil se não existe (fallback caso o trigger não tenha funcionado)
  const meta = user.user_metadata || {};
  const { data } = await sb.from('profiles').upsert({
    id: user.id,
    email: user.email,
    full_name: meta.full_name || user.email.split('@')[0],
    role: meta.role || 'parent',
  }).select().single();
  return data;
}

async function sbFetchProfs() {
  if (!sb) return DEMO.profs;
  const { data } = await sb.from('professionals').select('*').eq('active', true).order('name');
  return data || [];
}

async function sbFetchPts(profId) {
  if (!sb) return profId ? DEMO.pts.filter(p => p.professional_id === profId) : DEMO.pts;
  let q = sb.from('patients').select('*').eq('active', true).order('name');
  if (profId) q = q.eq('professional_id', profId);
  const { data } = await q;
  return data || [];
}

async function sbFetchSess() {
  if (!sb) return DEMO.sess;
  const { data } = await sb.from('sessions').select('*').order('date', { ascending: false });
  return data || [];
}

async function sbFetchPays() {
  if (!sb) return DEMO.pays;
  const { data } = await sb.from('payments').select('*').order('created_at', { ascending: false });
  return data || [];
}

async function sbFetchReqs() {
  if (!sb) return DEMO.reqs;
  const { data } = await sb.from('schedule_requests').select('*').eq('status', 'pendente');
  return data || [];
}

        <h1 style={{color:"#fff",fontSize:26,fontWeight:800,margin:0,letterSpacing:-.5}}>Psicomotriclinic</h1>
        <p style={{color:"rgba(255,255,255,.45)",fontSize:13,marginTop:6}}>Gestão Clínica</p>
      </div>
      {isDemo ? (
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {roles.map((r,i) => (
            <button key={r.id} onClick={() => onDemoLogin(r.id)} className="ch" style={{display:"flex",alignItems:"center",gap:14,width:"100%",padding:"16px 20px",background:"rgba(255,255,255,.07)",color:"#fff",border:"1px solid rgba(255,255,255,.1)",borderRadius:16,cursor:"pointer",fontSize:15,fontWeight:600,textAlign:"left",animation:"fu .45s ease both",animationDelay:`${i*100+200}ms`}}>
              <span style={{fontSize:28,width:44,textAlign:"center"}}>{r.emoji}</span><div>{r.label}</div>{I.arr("rgba(255,255,255,.3)")}
            </button>
          ))}
          <div style={{textAlign:"center",marginTop:16,padding:"10px 16px",borderRadius:12,background:"rgba(240,182,77,.12)"}}><p style={{color:"#F0B64D",fontSize:12,fontWeight:600,margin:0}}>Modo demo</p></div>
        </div>
      ) : (
        <div style={{animation:"fu .45s ease both",animationDelay:"200ms"}}>
          <input type="email" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} style={iSt} />
          <input type="password" placeholder="Password" value={pw} onChange={e => setPw(e.target.value)} onKeyDown={e => e.key === "Enter" && handleLogin()} style={iSt} />
          {err && <p style={{color:"#EF9A9A",fontSize:13,marginBottom:10,textAlign:"center"}}>{err}</p>}
          <button onClick={handleLogin} disabled={busy} className="ch" style={{width:"100%",padding:"15px 0",borderRadius:14,background:busy?"rgba(255,255,255,.1)":"#F0B64D",color:"#0E3A5A",border:"none",fontSize:16,fontWeight:700,cursor:busy?"wait":"pointer",marginTop:4}}>{busy ? "A entrar..." : "Entrar"}</button>
        </div>
      )}
    </div>
  );
};

/* ═══════════════════════════════════════════
   DIRECTOR PORTAL (with full management)
   ═══════════════════════════════════════════ */
const DirPortal = ({profile, onLogout}) => {
  const [tab, setTab] = useState("home");
  const [sub, setSub] = useState(null);
  const [toast, setToast] = useState(null);
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({});
  const [profs, setProfs] = useState([]);
  const [pts, setPts] = useState([]);
  const [sess, setSess] = useState([]);
  const [pays, setPays] = useState([]);
  const [reqs, setReqs] = useState([]);
  const [selProf, setSelProf] = useState(null);
  const [search, setSearch] = useState("");
  const [inviteResult, setInviteResult] = useState(null);

  const show = (m, t) => { setToast({m, t}); setTimeout(() => setToast(null), 3000); };

  // Load data
  useEffect(() => {
    (async () => {
      setProfs(await sbFetchProfs());
      setPts(await sbFetchPts());
      setSess(await sbFetchSess());
      setPays(await sbFetchPays());
      setReqs(await sbFetchReqs());
    })();
  }, []);

  const reload = async () => {
    setProfs(await sbFetchProfs());
    setPts(await sbFetchPts());
    setSess(await sbFetchSess());
    setPays(await sbFetchPays());
    setReqs(await sbFetchReqs());
  };

  // Calculations
  const realized = sess.filter(s => s.status === "realizada");
  const rev = (() => { let t = 0; realized.forEach(s => { const p = pts.find(x => x.id === s.patient_id); if (p?.session_type === "individual") t += 55; else t += 150; }); return t; })();
  const cr = Math.round(rev * .2), pr = Math.round(rev * .8), net = cr - 1500;
  const occ = Math.round((realized.length / 188) * 100);
  const tp = pays.reduce((a, p) => a + Number(p.amount), 0);
  const pp = pays.filter(p => p.status === "pago").reduce((a, p) => a + Number(p.amount), 0);
  const pend = pays.filter(p => p.status === "pendente");
  const colR = tp > 0 ? Math.round((pp / tp) * 100) : 0;

  // ─── ADD PROFESSIONAL ───
  const addProf = async () => {
    if (!form.name) return;
    const ini = form.name.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
    const color = COLORS[profs.length % COLORS.length];
    if (sb) {
      await sb.from('professionals').insert({ name: form.name, role_title: form.role || 'Psicomotricista', avatar_initials: ini, avatar_color: color });
    }
    setModal(null); setForm({}); show("Profissional adicionado", "success"); await reload();
  };

  // ─── ADD PATIENT ───
  const addPatient = async () => {
    if (!form.name || !form.age || !form.prof || !form.day || !form.hour || !form.area) return;
    if (sb) {
      await sb.from('patients').insert({ name: form.name, age: parseInt(form.age), professional_id: form.prof, session_type: form.type || 'individual', day_of_week: form.day, hour: form.hour, periodicity: form.freq || 'Semanal', intervention_area: form.area, start_date: new Date().toISOString().slice(0, 7) });
    }
    setModal(null); setForm({}); show("Caso adicionado", "success"); await reload();
  };

  // ─── ADD PAYMENT ───
  const addPayment = async () => {
    if (!form.pt || !form.amount) return;
    if (sb) {
      await sb.from('payments').insert({ patient_id: form.pt, month: 'Abril 2026', amount: parseFloat(form.amount), status: form.paySt || 'pendente', paid_date: form.paySt === 'pago' ? new Date().toISOString().slice(0, 10) : null });
    }
    setModal(null); setForm({}); show("Pagamento registado", "success"); await reload();
  };

  // ─── INVITE USER ───
  const inviteUser = async () => {
    if (!form.invEmail || !form.invName || !form.invRole) return;
    setInviteResult(null);
    if (!sb) { show("Só funciona com Supabase", "error"); return; }
    const tempPw = 'Psico' + Math.random().toString(36).slice(2, 8) + '!';
    const { data, error } = await sb.auth.signUp({
      email: form.invEmail,
      password: tempPw,
      options: { data: { full_name: form.invName, role: form.invRole } }
    });
    if (error) { show("Erro: " + error.message, "error"); return; }

    // Se for profissional, criar entrada na tabela professionals
    if (form.invRole === 'professional' && data?.user) {
      const ini = form.invName.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
      // Garantir perfil existe
      await sb.from('profiles').upsert({ id: data.user.id, email: form.invEmail, full_name: form.invName, role: 'professional' });
      await sb.from('professionals').insert({ name: form.invName, role_title: 'Psicomotricista', avatar_initials: ini, avatar_color: COLORS[profs.length % COLORS.length], profile_id: data.user.id });
    } else if (data?.user) {
      await sb.from('profiles').upsert({ id: data.user.id, email: form.invEmail, full_name: form.invName, role: form.invRole });
    }

    setInviteResult({ email: form.invEmail, pw: tempPw, role: form.invRole, name: form.invName });
    show("Conta criada com sucesso", "success");
    await reload();
  };

  const copyToClipboard = (text) => {
    navigator.clipboard.writeText(text).then(() => show("Copiado!", "success")).catch(() => {});
  };

  // ─── APPROVE / REJECT ───
  const approveReq = async (rid) => {
    if (sb) await sb.from('schedule_requests').update({ status: 'aprovado' }).eq('id', rid);
    show("Aprovado", "success"); await reload();
  };
  const rejectReq = async (rid) => {
    if (sb) await sb.from('schedule_requests').update({ status: 'recusado' }).eq('id', rid);
    show("Recusado", "error"); await reload();
  };

  const nt = [
    {id:"home",label:"Dashboard",icon:I.bar},
    {id:"cases",label:"Casos",icon:I.usr},
    {id:"manage",label:"Gestão",icon:I.gear},
    {id:"requests",label:"Pedidos",icon:I.swp},
  ];

  return (
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"#F4F7FA",position:"relative"}}>
      <div style={{paddingBottom:88}}>
        <Header title="Dashboard" sub={profile?.full_name || "Diretora"} avatar={<div onClick={onLogout} style={{cursor:"pointer"}}><Av t={profile?.full_name?.split(" ").map(w=>w[0]).join("").slice(0,2)||"RP"} bg="#F0B64D" sz={38}/></div>} />

        {/* ─── HOME TAB ─── */}
        {!sub && tab === "home" && (
          <P>
            <Card delay={0} style={{background:"linear-gradient(135deg,#0E3A5A,#1A5F8A)",border:"none",color:"#fff"}}>
              <div style={{fontSize:12,opacity:.6}}>Receita bruta</div>
              <div style={{fontSize:34,fontWeight:800,letterSpacing:-1,marginBottom:4}}>{rev.toLocaleString("pt-PT")}€</div>
              <div style={{display:"flex",gap:20,marginTop:8}}>
                <div><div style={{fontSize:11,opacity:.5}}>Clínica (20%)</div><div style={{fontSize:17,fontWeight:700}}>{cr}€</div></div>
                <div><div style={{fontSize:11,opacity:.5}}>Prof. (80%)</div><div style={{fontSize:17,fontWeight:700}}>{pr}€</div></div>
                <div><div style={{fontSize:11,opacity:.5}}>Resultado</div><div style={{fontSize:17,fontWeight:800,color:net>=0?"#A5D6A7":"#EF9A9A"}}>{net>=0?"+":""}{net}€</div></div>
              </div>
            </Card>
            <div style={{display:"flex",gap:8,marginBottom:4}}>
              <Stat value={realized.length} label="Realizadas" bg="#F0FAF0" accent="#2E7D32"/>
              <Stat value={sess.filter(s=>s.status==="falta").length} label="Faltas" bg="#FFF5F5" accent="#C62828"/>
              <Stat value={sess.filter(s=>s.status==="agendada").length} label="Agendadas" bg="#F0F4FF" accent="#1565C0"/>
            </div>
            <Card delay={80}><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:14,fontWeight:600,color:"#0E3A5A"}}>Ocupação</span><span style={{fontSize:14,fontWeight:800}}>{occ}%</span></div><Progress pct={occ} color="#AFC9A3"/><div style={{fontSize:12,color:"#8A9BB0",marginTop:6}}>{realized.length} de 188 sessões</div></Card>
            <Card delay={100}><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:14,fontWeight:600,color:"#0E3A5A"}}>Cobrança</span><span style={{fontSize:14,fontWeight:800,color:colR>=80?"#2E7D32":"#E65100"}}>{colR}%</span></div><Progress pct={colR} color={colR>=80?"#AFC9A3":"#F0B64D"}/></Card>
            {pend.length > 0 && (
              <Card delay={120} style={{borderLeft:"4px solid #F0B64D",background:"#FFFDF7"}}>
                <div style={{fontSize:13,fontWeight:700,color:"#E65100",marginBottom:6}}>Pendentes ({pend.length})</div>
                {pend.map(p => { const pt = pts.find(x => x.id === p.patient_id); return ( <div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #F5F0E5"}}><span style={{fontSize:13,color:"#4A5568"}}>{pt?.name || "—"}</span><span style={{fontSize:13,fontWeight:700,color:"#E65100"}}>{p.amount}€</span></div> ); })}
              </Card>
            )}
            <Section>Profissionais</Section>
            {profs.map((p, i) => {
              const pPts = pts.filter(pt => pt.professional_id === p.id);
              return (
                <Card key={p.id} delay={i*60+140} onClick={() => { setSelProf(p); setSub("prof"); }}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <Av t={p.avatar_initials} bg={p.avatar_color}/>
                    <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:"#0E3A5A"}}>{p.name}</div><div style={{fontSize:12,color:"#8A9BB0"}}>{pPts.length} casos · {p.role_title}</div></div>
                    {I.arr()}
                  </div>
                </Card>
              );
            })}
            <Section>Custos</Section>
            <Card delay={300}><div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><span style={{fontSize:14,color:"#4A5568"}}>Renda</span><span style={{fontSize:14,fontWeight:700,color:"#C62828"}}>-1.500€</span></div><div style={{height:1,background:"#EDF1F5",margin:"6px 0"}}/><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:15,fontWeight:700,color:"#0E3A5A"}}>Resultado</span><span style={{fontSize:18,fontWeight:800,color:net>=0?"#2E7D32":"#C62828"}}>{net>=0?"+":""}{net}€</span></div></Card>
          </P>
        )}

        {/* ─── CASES TAB ─── */}
        {!sub && tab === "cases" && (
          <P>
            <Section right={<span onClick={() => {setForm({});setModal("addPatient");}} style={{cursor:"pointer",color:"#0E3A5A",fontWeight:700}}>+ Novo</span>}>Casos ({pts.length})</Section>
            {pts.map((p, i) => {
              const prN = profs.find(pr => pr.id === p.professional_id)?.name;
              return (
                <Card key={p.id} delay={i*40}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <Av t={p.name.split(" ").map(w=>w[0]).join("").slice(0,2)} bg={p.session_type==="individual"?"#D3E0EF":"#FFF3E0"} sz={40}/>
                    <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:"#0E3A5A"}}>{p.name}</div><div style={{fontSize:12,color:"#8A9BB0"}}>{p.age} anos · {prN || "—"} · {p.day_of_week} {p.hour}</div><div style={{fontSize:11,color:"#6B94B8"}}>{p.intervention_area}</div></div>
                  </div>
                </Card>
              );
            })}
          </P>
        )}

        {/* ─── MANAGE TAB (NEW!) ─── */}
        {!sub && tab === "manage" && (
          <P>
            <Section>Ações rápidas</Section>
            <Card delay={0} onClick={() => {setForm({});setModal("invite");}}>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <div style={{width:48,height:48,borderRadius:14,background:"#F3E5F5",display:"flex",alignItems:"center",justifyContent:"center"}}>{I.mail("#6A1B9A")}</div>
                <div style={{flex:1}}><div style={{fontSize:15,fontWeight:700,color:"#0E3A5A"}}>Convidar utilizador</div><div style={{fontSize:13,color:"#8A9BB0"}}>Criar conta para profissional ou pai/mãe</div></div>
                {I.arr()}
              </div>
            </Card>
            <Card delay={60} onClick={() => {setForm({});setModal("addProf");}}>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <div style={{width:48,height:48,borderRadius:14,background:"#E8F5E9",display:"flex",alignItems:"center",justifyContent:"center"}}>{I.usr("#2E7D32")}</div>
                <div style={{flex:1}}><div style={{fontSize:15,fontWeight:700,color:"#0E3A5A"}}>Adicionar profissional</div><div style={{fontSize:13,color:"#8A9BB0"}}>Novo terapeuta sem conta de acesso</div></div>
                {I.arr()}
              </div>
            </Card>
            <Card delay={120} onClick={() => {setForm({});setModal("addPatient");}}>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <div style={{width:48,height:48,borderRadius:14,background:"#E3F2FD",display:"flex",alignItems:"center",justifyContent:"center"}}>{I.usr("#1565C0")}</div>
                <div style={{flex:1}}><div style={{fontSize:15,fontWeight:700,color:"#0E3A5A"}}>Adicionar paciente</div><div style={{fontSize:13,color:"#8A9BB0"}}>Novo caso clínico</div></div>

              </div>
            </Card>
            <Card delay={180} onClick={() => {setForm({});setModal("addPayment");}}>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <div style={{width:48,height:48,borderRadius:14,background:"#FFF8E1",display:"flex",alignItems:"center",justifyContent:"center"}}>{I.wal("#E65100")}</div>
                <div style={{flex:1}}><div style={{fontSize:15,fontWeight:700,color:"#0E3A5A"}}>Registar pagamento</div><div style={{fontSize:13,color:"#8A9BB0"}}>Adicionar recibo ou marcar pendente</div></div>
                {I.arr()}
              </div>
            </Card>

            <Section>Equipa ({profs.length})</Section>
            {profs.map((p, i) => (
              <Card key={p.id} delay={i*40+240}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <Av t={p.avatar_initials} bg={p.avatar_color} sz={38}/>
                  <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:"#0E3A5A"}}>{p.name}</div><div style={{fontSize:12,color:"#8A9BB0"}}>{p.role_title}</div></div>
                  <Tag type="professional">Ativo</Tag>
                </div>
              </Card>
            ))}
          </P>
        )}

        {/* ─── REQUESTS TAB ─── */}
        {!sub && tab === "requests" && (
          <P>
            <Section>Pedidos pendentes ({reqs.length})</Section>

              const ptN = pts.find(p => p.id === r.patient_id)?.name;

                <Card key={r.id} delay={i*80}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>

                  <div style={{display:"flex",gap:8}}>
                    <button onClick={() => approveReq(r.id)} className="ch" style={{flex:1,padding:"12px 0",borderRadius:12,border:"none",background:"#0E3A5A",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>{I.chk()} Aprovar</button>

                  </div>
                </Card>
              );
            })}
          </P>
        )}

        {/* ─── PROF DETAIL ─── */}
        {sub === "prof" && selProf && (() => {

          const pPts = pts.filter(pt => pt.professional_id === p.id);
          const pSess = sess.filter(s => pPts.some(pt => pt.id === s.patient_id) && s.status === "realizada");
          let iE = 0, gE = 0;

                    </div>
                  </Card>

              </P>
            </div>

        ) : (
          <div>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{width:56,height:56,borderRadius:28,background:"#E8F5E9",display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:12}}>{I.chk("#2E7D32")}</div>
              <div style={{fontSize:16,fontWeight:700,color:"#0E3A5A"}}>Conta criada!</div>
              <div style={{fontSize:13,color:"#8A9BB0",marginTop:4}}>Partilha estes dados com {inviteResult.name}:</div>
            </div>
            <div style={{background:"#F7F9FC",borderRadius:14,padding:16,marginBottom:16}}>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:12,color:"#8A9BB0",marginBottom:2}}>Email</div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <span style={{fontSize:15,fontWeight:600,color:"#0E3A5A"}}>{inviteResult.email}</span>
                  <div onClick={() => copyToClipboard(inviteResult.email)} style={{cursor:"pointer",padding:4}}>{I.copy()}</div>
                </div>
              </div>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:12,color:"#8A9BB0",marginBottom:2}}>Password temporária</div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <span style={{fontSize:15,fontWeight:600,color:"#0E3A5A",fontFamily:"monospace"}}>{inviteResult.pw}</span>
                  <div onClick={() => copyToClipboard(inviteResult.pw)} style={{cursor:"pointer",padding:4}}>{I.copy()}</div>
                </div>
              </div>
              <div>
                <div style={{fontSize:12,color:"#8A9BB0",marginBottom:2}}>Papel</div>
                <Tag type={inviteResult.role}>{ROLES_MAP[inviteResult.role]}</Tag>
              </div>
            </div>
            <Btn onClick={() => copyToClipboard(`Olá ${inviteResult.name}!\n\nJá tens acesso à app Psicomotriclinic.\n\nLink: ${window.location.href}\nEmail: ${inviteResult.email}\nPassword: ${inviteResult.pw}\n\nAltera a password depois de entrar.`)}>Copiar mensagem para enviar</Btn>
            <div style={{marginTop:8}}><Btn secondary onClick={() => {setModal(null);setInviteResult(null);}}>Fechar</Btn></div>
          </div>
        )}
      </Sheet>

      {/* ADD PROFESSIONAL */}
      <Sheet open={modal==="addProf"} onClose={() => setModal(null)} title="Adicionar profissional">
        <Field label="Nome completo"><Inp placeholder="Ex: Maria Santos" value={form.name||""} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></Field>
        <Field label="Função"><Sel value={form.role||"Psicomotricista"} onChange={v=>setForm(f=>({...f,role:v}))} options={[{v:"Psicomotricista",l:"Psicomotricista"},{v:"Terapeuta Ocupacional",l:"Terapeuta Ocupacional"},{v:"Psicólogo/a",l:"Psicólogo/a"}]}/></Field>
        <div style={{marginTop:8}}><Btn onClick={addProf} disabled={!form.name}>Adicionar</Btn></div>
      </Sheet>

      {/* ADD PATIENT */}
      <Sheet open={modal==="addPatient"} onClose={() => setModal(null)} title="Novo caso">
        <Field label="Nome"><Inp placeholder="Ex: Maria S." value={form.name||""} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></Field>
        <Field label="Idade"><Inp type="number" placeholder="12" value={form.age||""} onChange={e=>setForm(f=>({...f,age:e.target.value}))}/></Field>
        <Field label="Profissional"><Sel value={form.prof||""} onChange={v=>setForm(f=>({...f,prof:v}))} options={profs.map(p=>({v:p.id,l:p.name}))}/></Field>
        <Field label="Área"><Sel value={form.area||""} onChange={v=>setForm(f=>({...f,area:v}))} options={AREAS.map(a=>({v:a,l:a}))}/></Field>
        <Field label="Dia"><Sel value={form.day||""} onChange={v=>setForm(f=>({...f,day:v}))} options={DAYS.map(d=>({v:d,l:d}))}/></Field>
        <Field label="Hora"><Sel value={form.hour||""} onChange={v=>setForm(f=>({...f,hour:v}))} options={HOURS.map(h=>({v:h,l:h}))}/></Field>
        <div style={{marginTop:8}}><Btn onClick={addPatient} disabled={!form.name||!form.age||!form.prof||!form.area||!form.day||!form.hour}>Criar caso</Btn></div>
      </Sheet>

      {/* ADD PAYMENT */}
      <Sheet open={modal==="addPayment"} onClose={() => setModal(null)} title="Registar pagamento">
        <Field label="Paciente"><Sel value={form.pt||""} onChange={v=>setForm(f=>({...f,pt:v}))} options={pts.map(p=>({v:p.id,l:p.name}))}/></Field>
        <Field label="Valor (€)"><Inp type="number" placeholder="220" value={form.amount||""} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/></Field>
        <Field label="Estado"><Sel value={form.paySt||"pendente"} onChange={v=>setForm(f=>({...f,paySt:v}))} options={[{v:"pago",l:"Pago"},{v:"pendente",l:"Pendente"}]}/></Field>
        <div style={{marginTop:8}}><Btn onClick={addPayment} disabled={!form.pt||!form.amount}>Registar</Btn></div>
      </Sheet>
    </div>
  );
};

/* ═══════════════════════════════════════════
   PLACEHOLDER PORTALS (parent + professional)
   ═══════════════════════════════════════════ */
const SimplePortal = ({role, profile, onLogout}) => {
  const title = role === "parent" ? "Portal dos Pais" : "Portal do Profissional";
  const emoji = role === "parent" ? "👨‍👩‍👧" : "🩺";
  return (
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"#F4F7FA"}}>
      <Header title={`Olá 👋`} sub={profile?.full_name} avatar={<div onClick={onLogout} style={{cursor:"pointer"}}><Av t={profile?.full_name?.split(" ").map(w=>w[0]).join("").slice(0,2)||"?"} bg="#D3E0EF" sz={38}/></div>}/>
      <P>
        <Card style={{textAlign:"center",padding:40,marginTop:20}}>
          <div style={{fontSize:48,marginBottom:16}}>{emoji}</div>
          <div style={{fontSize:20,fontWeight:700,color:"#0E3A5A",marginBottom:8}}>{title}</div>
          <div style={{fontSize:14,color:"#8A9BB0",lineHeight:1.6}}>
            Sessão iniciada como <Tag type={role}>{ROLES_MAP[role]}</Tag>
          </div>
          <div style={{fontSize:13,color:"#8A9BB0",marginTop:16}}>Este portal será expandido em breve.</div>
        </Card>
        <div style={{marginTop:16}}>
          <Btn secondary onClick={onLogout}>Terminar sessão</Btn>
        </div>
      </P>
    </div>
  );
};

/* ═══════════════════════════════════════════
   APP ROOT
   ═══════════════════════════════════════════ */
function App() {
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (isDemo) { setLoading(false); return; }
    // Check existing session
    sb.auth.getSession().then(async ({ data: { session } }) => {
      if (session?.user) {
        const p = await sbEnsureProfile(session.user);
        setProfile(p);
      }
      setLoading(false);
    });
    // Listen for auth changes
    const { data: { subscription } } = sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_IN' && session?.user) {
        const p = await sbEnsureProfile(session.user);
        setProfile(p);
        setLoading(false);
      } else if (event === 'SIGNED_OUT') {
        setProfile(null);
      }
    });
    return () => subscription.unsubscribe();
  }, []);

  const handleDemoLogin = (role) => {
    setProfile({ id: 'demo', full_name: role === 'director' ? 'Rita Palma' : role === 'professional' ? 'Ana Martins' : 'Pai do Tomás', role, email: 'demo@demo' });
  };

  const handleLogout = async () => {
    if (sb) await sb.auth.signOut();
    setProfile(null);
  };

  // Loading screen
  if (loading) return (
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"#0E3A5A",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center",color:"#fff"}}>
        <div style={{width:48,height:48,borderRadius:16,background:"rgba(240,182,77,.15)",display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:16}}><span style={{fontSize:24,fontWeight:800,color:"#F0B64D"}}>P</span></div>
        <p style={{fontSize:14,opacity:.6}}>A carregar...</p>
      </div>
    </div>
  );

  // Not logged in
  if (!profile) return ( <Login onDemoLogin={handleDemoLogin} onLoading={() => setLoading(true)} /> );

  // Logged in — route by role
  if (profile.role === "director") return ( <DirPortal profile={profile} onLogout={handleLogout}/> );
  return ( <SimplePortal role={profile.role} profile={profile} onLogout={handleLogout}/> );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
